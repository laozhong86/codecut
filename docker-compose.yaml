services:
  # Uncomment if you need authentication (requires DATABASE_URL + BETTER_AUTH_SECRET)
  # postgres:
  #   image: postgres:17-alpine
  #   environment:
  #     POSTGRES_USER: codecut
  #     POSTGRES_PASSWORD: codecut
  #     POSTGRES_DB: codecut
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   ports:
  #     - "5432:5432"
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U codecut -d codecut"]
  #     interval: 5s
  #     timeout: 5s
  #     retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  serverless-redis-http:
    image: hiett/serverless-redis-http:latest
    environment:
      SRH_MODE: env
      SRH_TOKEN: codecut_redis_token
      SRH_CONNECTION_STRING: redis://redis:6379
    ports:
      - "8079:80"
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: http://localhost:3000
      # DATABASE_URL: postgresql://codecut:codecut@postgres:5432/codecut
      # BETTER_AUTH_SECRET: change_me_to_a_random_secret
      UPSTASH_REDIS_REST_URL: http://serverless-redis-http:80
      UPSTASH_REDIS_REST_TOKEN: codecut_redis_token
    depends_on:
      serverless-redis-http:
        condition: service_started

