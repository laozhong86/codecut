name: Bun CI

concurrency:
  group: bun-ci-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
  pull_request:
    branches: [main]
    paths-ignore:
      - "*.md"

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    env:
      DATABASE_URL: "postgresql://codecut:codecut@localhost:5432/codecut"
      BETTER_AUTH_SECRET: "supersecret"
      NEXT_PUBLIC_SITE_URL: "http://localhost:3000"
      UPSTASH_REDIS_REST_URL: "https://your-upstash-redis-url"
      UPSTASH_REDIS_REST_TOKEN: "your-upstash-redis-token"

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Install Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.2.18

      - name: Cache Bun modules
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-1.2.18-${{ hashFiles('bun.lock') }}

      - name: Install FFmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install FFmpeg (macOS)
        if: runner.os == 'macOS'
        run: brew install ffmpeg

      - name: Install FFmpeg (Windows)
        if: runner.os == 'Windows'
        run: choco install ffmpeg -y --no-progress

      - name: Verify FFmpeg
        run: ffmpeg -version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build:web

      - name: Lint
        run: bun run lint:web

      - name: Typecheck
        run: bun run typecheck:web

      - name: Run tests
        run: bun test

      - name: Check focused coverage
        if: matrix.os == 'ubuntu-latest'
        run: bun run coverage:focused

      - name: Install Playwright Chromium
        if: matrix.os == 'ubuntu-latest'
        run: bun x playwright install --with-deps chromium

      - name: Run Playwright smoke
        if: matrix.os == 'ubuntu-latest'
        run: bun run test:e2e
