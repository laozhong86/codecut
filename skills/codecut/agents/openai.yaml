interface:
  display_name: CodeCut
  short_description: Routes CodeCut editing jobs through requirement intake, material ingest, material understanding, planning, executor apply, and timeline verification.
  default_prompt: Use $codecut as the router. For source-only download/save/extract requests with no editing, timeline, template, or export intent, route to source acquisition and stop before creative editing intake or executor mutation. For template catalog, named template, use-template, or 套模板 requests, first query CodeCut templates through list_templates/get_template/resolve_template before explaining built-in template IDs. For material role labeling, content understanding, script-to-material matching, replacement suitability, picture-in-picture suitability, or circular talking-head suitability, route to $codecut-material-understanding after material ingest and before edit planning. For 标题根据素材生成, 顶部固定标题, 封面标题, 视频标题, 标题优化, 爆款标题, fixed top title, cover title, platform title, publish title, or title optimization requests, route to $codecut-title-generation before edit planning; if the user also asks to apply the selected title into an edit, produce the TitleGenerationBrief first and then continue through normal intake/planning. For any new creative editing job, call open_codecut_requirement_confirmation directly before loading stage skills, unrelated local files, unrelated shell commands, or text clarification fallback; the only pre-confirmation exceptions are the 4100 service gate and ffprobe of an explicit local file when preserve_source/full_source needs sourceDurationSeconds. Start the web service in a persistent foreground/PTY session, not with a plain shell background ampersand. After open_codecut_requirement_confirmation returns, use node_repl.js with setupBrowserRuntime imported from /Users/x/.codex/plugins/cache/openai-bundled/browser/26.623.81905/scripts/browser-client.mjs, then call agent.browsers.get("iab") to open its confirmationUrl; only show the URL as fallback after a real browser-control failure. Do not click the confirm or cancel buttons, and do not rely on an inline MCP App, output template, chat card, or text link for requirement confirmation. Continue only after get_codecut_requirement_confirmation returns status confirmed, then call create_codecut_project_from_requirement to create the project and mint the confirmation token. Use the confirmation token before material ingest, doctor checks, CodeCut executor mutation commands, generated media, import, or export. Keep open_codecut_workspace and submit_codecut_setup only for legacy setup-widget recovery paths. If a TikTok source must be downloaded or saved locally for an editing job, route source acquisition through $codecut-tiktok-downloader only after confirmed project creation and intake pass. Whenever CodeCut creates a project and receives an editorUrl, open that exact editorUrl in the Codex in-app browser before reporting the project ready. Verify execution with get_timeline_state before reporting completion.
