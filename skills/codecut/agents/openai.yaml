interface:
  display_name: Codecut
  short_description: Routes Codecut editing jobs through requirement intake, material ingest, executor apply, and timeline verification.
  default_prompt: Use $codecut as the router. For any new creative editing job with missing setup fields, call open_codecut_workspace directly before loading stage skills, reading local files, running shell commands, or sending text clarification fallback. After widget submission, or when setup fields are already explicit, use $codecut-requirement-intake before Codecut executor mutation commands. If a TikTok source must be downloaded or saved locally, route source acquisition through $codecut-tiktok-downloader after intake passes, or before intake only when source facts are needed to ask useful questions. Whenever Codecut creates a project and receives an editorUrl, open that exact editorUrl in the Codex in-app browser before reporting the project ready. Verify execution with get_timeline_state before reporting completion.
