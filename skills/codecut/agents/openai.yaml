interface:
  display_name: CodeCut
  short_description: Routes CodeCut editing jobs through requirement intake, material ingest, material understanding, planning, executor apply, and timeline verification.
  default_prompt: Use $codecut as the router. For source-only download/save/extract requests with no editing, timeline, template, or export intent, route to source acquisition and stop before creative editing intake or executor mutation. For template catalog, named template, use-template, or 套模板 requests, first query CodeCut system template scripts through list_system_template_scripts/get_system_template_script/resolve_system_template_script before explaining built-in video template IDs. For material role labeling, content understanding, script-to-material matching, replacement suitability, picture-in-picture suitability, split-screen suitability, or circular talking-head suitability, route to $codecut-material-understanding after material ingest and before edit planning. For any new creative editing job with missing setup fields, call open_codecut_workspace directly before loading stage skills, reading local files, running shell commands, or sending text clarification fallback. Only submit_codecut_setup can mint the confirmation token; use that token before material ingest, doctor checks, CodeCut executor mutation commands, generated media, import, or export. If a TikTok source must be downloaded or saved locally for an editing job, route source acquisition through $codecut-tiktok-downloader only after widget submission and intake pass. Whenever CodeCut creates a project and receives an editorUrl, open that exact editorUrl in the Codex in-app browser before reporting the project ready. Verify execution with get_timeline_state before reporting completion.
