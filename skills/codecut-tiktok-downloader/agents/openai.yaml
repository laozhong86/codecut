interface:
  display_name: Codecut TikTok Downloader
  short_description: Acquires TikTok source media into a Codecut project workspace before material audit or editing.
  default_prompt: Use $codecut-tiktok-downloader when a Codecut source is a TikTok video, photo post, share link, author page, or @handle and the user wants it downloaded or saved locally. For source-only requests, save the source without opening the creative editing widget, record download_manifest.json evidence, and stop before creative editing intake or executor mutation. For editing jobs, hand off to $codecut-requirement-intake first; do not download, probe, or write Codecut workspace files before widget submission.
