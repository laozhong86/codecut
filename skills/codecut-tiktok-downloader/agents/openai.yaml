interface:
  display_name: Codecut TikTok Downloader
  short_description: Acquires TikTok source media into a Codecut project workspace before material audit or editing.
  default_prompt: Use $codecut-tiktok-downloader when a Codecut source is a TikTok video, photo post, share link, author page, or @handle and the user wants it downloaded or saved locally. For source-only requests, download into the Codecut project asset directory, record download_manifest.json evidence, hand off to $codecut-material-ingest for material audit, and stop before creative editing intake. For editing jobs, hand off to $codecut-requirement-intake before executor mutation.
