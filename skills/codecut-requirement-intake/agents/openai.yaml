interface:
  display_name: Codecut Requirement Intake
  short_description: Confirms platform, aspect ratio, output form, captions, and business intent before Codecut editing execution.
  default_prompt: Use $codecut-requirement-intake before any new Codecut creative editing job after setup submission. When setup fields are missing and this skill is already loaded, call open_codecut_workspace before text-only questions, local file reads, shell commands, workspace writes, material ingest, doctor checks, or project creation. If the tool is not visible, discover it with tool_search first. Complete setup fields are not create-project confirmation. Do not call submit_codecut_setup until the user explicitly confirms creating the project in chat or submits the widget, then pass confirmedByUser true with the pendingConfirmationId returned by open_codecut_workspace. Do not run Codecut side-effect tools until submit_codecut_setup returns a confirmation token and requirement intake passes.
