interface:
  display_name: Codecut Requirement Intake
  short_description: Confirms platform, aspect ratio, output form, captions, and business intent before Codecut editing execution.
  default_prompt: Use $codecut-requirement-intake before any new Codecut creative editing job after confirmed requirement readback and project creation. When setup fields are missing and this skill is already loaded, call open_codecut_requirement_confirmation before text-only questions, local file reads, shell commands, workspace writes, material ingest, doctor checks, or project creation. If the tool is not visible, discover it with tool_search first. Complete setup fields are not create-project confirmation. After open_codecut_requirement_confirmation returns, open its confirmationUrl in the Codex in-app browser when browser control is available; if browser control is unavailable, show the URL as a fallback. Continue only after get_codecut_requirement_confirmation returns status confirmed, then call create_codecut_project_from_requirement to mint the confirmation token. Do not run Codecut side-effect tools until create_codecut_project_from_requirement returns a confirmation token and requirement intake passes. Keep open_codecut_workspace and submit_codecut_setup only for legacy setup-widget recovery paths.
