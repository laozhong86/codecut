interface:
  display_name: Codecut Requirement Intake
  short_description: Confirms platform, aspect ratio, output form, captions, and business intent before Codecut editing execution.
  default_prompt: Use $codecut-requirement-intake before any new Codecut creative editing job after widget submission or when setup fields are already explicit. When setup fields are missing and this skill is already loaded, call open_codecut_workspace before text-only questions, local file reads, or shell commands. If the tool is not visible, discover it with tool_search first. Do not run Codecut executor mutation commands until requirement intake passes.
