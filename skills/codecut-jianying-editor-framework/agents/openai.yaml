interface:
  display_name: Codecut Jianying Editor Framework
  short_description: Routes Codecut editing jobs through requirement intake, material ingest, executor apply, and timeline verification.
  default_prompt: Use $codecut-jianying-editor-framework as the router. Open the local preview in the Codex in-app browser for human review when needed, but use local executor commands for agent execution. For any new creative editing job or remote URL, use $codecut-requirement-intake before Codecut executor mutation commands; when setup fields are missing, call open_codecut_workspace so the Codecut workspace setup widget collects the answers before text clarification fallback. If a TikTok source must be downloaded or saved locally, route source acquisition through $codecut-tiktok-downloader before material audit or executor import. Verify execution with get_timeline_state before reporting completion.
