<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodeCut Workspace</title>
    <style>
      :root {
        --cc-background: #f7f8f6;
        --cc-surface: #ffffff;
        --cc-surface-muted: #f8faf8;
        --cc-accent: #f4f6f4;
        --cc-foreground: #1c2422;
        --cc-muted-foreground: #59635f;
        --cc-primary: #18231f;
        --cc-primary-foreground: #ffffff;
        --cc-border: #d9dfda;
        --cc-control-border: #cbd4cf;
        --cc-subtle-border: #e1e6e2;
        --cc-disabled-border: #c7cec9;
        --cc-disabled-foreground: #7a8580;
        --cc-disabled-background: #eef1ee;
        --cc-success: #0b6d45;
        --cc-danger: #9d2b22;
        --cc-create-cta-background: #ecfdf3;
        --cc-create-cta-background-hover: #d7fbe6;
        --cc-create-cta-border: #38b56e;
        --cc-create-cta-foreground: #073f29;
        --cc-radius-sm: 6px;
        --cc-radius-md: 8px;
        --cc-radius-pill: 999px;
        --cc-button-height: 38px;
        --cc-button-padding-x: 16px;
        --cc-control-padding-y: 9px;
        --cc-control-padding-x: 10px;
        --cc-space-xs: 6px;
        --cc-space-sm: 8px;
        --cc-space-md: 12px;
        --cc-space-lg: 14px;
        --cc-media-list-max-height: 192px;
        --cc-media-thumbnail-size: 44px;
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--cc-foreground);
        background: var(--cc-background);
      }

      body {
        margin: 0;
        padding: var(--cc-button-padding-x);
      }

      main {
        max-width: 940px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--cc-muted-foreground);
      }

      form {
        display: grid;
        gap: var(--cc-space-lg);
        margin-top: var(--cc-button-padding-x);
      }

      fieldset {
        display: grid;
        gap: var(--cc-space-md);
        margin: 0;
        padding: var(--cc-space-lg);
        border: 1px solid var(--cc-border);
        border-radius: var(--cc-radius-md);
        background: var(--cc-surface);
      }

      .intent-field {
        display: grid;
        gap: var(--cc-space-sm);
      }

      .section-heading {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.35;
      }

      label {
        display: grid;
        gap: var(--cc-space-xs);
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--cc-control-border);
        border-radius: var(--cc-radius-sm);
        padding: var(--cc-control-padding-y) var(--cc-control-padding-x);
        font: inherit;
        color: var(--cc-foreground);
        background: var(--cc-surface);
      }

      textarea {
        min-height: 78px;
        resize: vertical;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--cc-space-md);
      }

      .actions,
      .result-actions,
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .choice-options {
        display: flex;
        flex-wrap: wrap;
        gap: var(--cc-space-md) var(--cc-space-lg);
      }

      .media-sources {
        display: grid;
        gap: var(--cc-space-sm);
        max-height: var(--cc-media-list-max-height);
        overflow-y: auto;
        padding: var(--cc-space-xs);
        border: 1px solid var(--cc-subtle-border);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-accent);
      }

      .media-source-row {
        display: grid;
        grid-template-columns: var(--cc-media-thumbnail-size) minmax(0, 1fr) auto;
        align-items: center;
        gap: var(--cc-space-sm);
        padding: var(--cc-space-sm);
        border: 1px solid var(--cc-subtle-border);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-surface-muted);
      }

      .media-source-thumbnail {
        display: grid;
        place-items: center;
        width: var(--cc-media-thumbnail-size);
        height: var(--cc-media-thumbnail-size);
        overflow: hidden;
        border: 1px solid var(--cc-control-border);
        border-radius: var(--cc-radius-sm);
        color: var(--cc-muted-foreground);
        background: var(--cc-surface);
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .media-source-thumbnail img,
      .media-source-thumbnail video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .media-source-path {
        min-width: 0;
        color: var(--cc-foreground);
        font-size: 13px;
        line-height: 1.35;
      }

      .media-source-path code {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .media-source-remove-button {
        display: grid;
        place-items: center;
        width: 26px;
        height: 26px;
        min-width: 26px;
        min-height: 26px;
        border-color: rgba(157, 43, 34, 0.35);
        padding: 0;
        color: var(--cc-danger);
        background: transparent;
        font-size: 14px;
        line-height: 1;
        opacity: 0;
        pointer-events: none;
        transition: opacity 120ms ease, border-color 120ms ease, background 120ms ease;
      }

      .media-source-row:hover .media-source-remove-button,
      .media-source-row:focus-within .media-source-remove-button {
        opacity: 1;
        pointer-events: auto;
      }

      .media-source-remove-button:hover,
      .media-source-remove-button:focus-visible {
        border-color: var(--cc-danger);
        background: rgba(157, 43, 34, 0.08);
      }

      .switch-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--cc-subtle-border);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-surface-muted);
      }

      .switch-row input {
        width: auto;
        margin-top: 2px;
      }

      .switch-copy {
        display: grid;
        gap: 3px;
      }

      .file-picker-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .choice-option {
        min-width: 76px;
        border-color: var(--cc-primary);
        border-radius: var(--cc-radius-pill);
        padding: 8px 18px;
        color: var(--cc-primary);
        background: var(--cc-surface);
        text-align: center;
      }

      .choice-option.is-active {
        border-color: var(--cc-primary);
        color: var(--cc-primary-foreground);
        background: var(--cc-primary);
      }

      button,
      a.button {
        min-height: var(--cc-button-height);
        border: 1px solid var(--cc-primary);
        border-radius: var(--cc-radius-sm);
        padding: 9px var(--cc-button-padding-x);
        font: inherit;
        font-weight: 650;
        color: var(--cc-primary-foreground);
        background: var(--cc-primary);
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary {
        color: var(--cc-primary);
        background: var(--cc-surface);
      }

      .create-project-cta {
        min-height: 46px;
        border-color: var(--cc-create-cta-border);
        padding: 11px 24px;
        color: var(--cc-create-cta-foreground);
        background: var(--cc-create-cta-background);
        box-shadow: 0 0 0 1px rgba(56, 181, 110, 0.22), 0 10px 24px rgba(7, 63, 41, 0.18);
      }

      .create-project-cta:hover {
        background: var(--cc-create-cta-background-hover);
      }

      button:disabled {
        border-color: var(--cc-disabled-border);
        color: var(--cc-disabled-foreground);
        background: var(--cc-disabled-background);
        cursor: not-allowed;
      }

      .result,
      .follow-up {
        border: 1px solid var(--cc-border);
        border-radius: var(--cc-radius-md);
        padding: var(--cc-space-md);
        background: var(--cc-surface);
      }

      .checks {
        display: grid;
        gap: var(--cc-space-sm);
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }

      .checks li {
        display: grid;
        gap: 3px;
        padding: var(--cc-space-sm);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-accent);
      }

      .ok {
        color: var(--cc-success);
      }

      .blocked,
      .error {
        color: var(--cc-danger);
      }

      .muted {
        color: var(--cc-muted-foreground);
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      code,
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 720px) {
        body {
          padding: var(--cc-space-md);
        }

        .grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="title">CodeCut Workspace</h1>
      <p data-i18n="subtitle">Review the prefilled editing intent, adjust only if needed, then create the executor project.</p>

      <section id="setup-unavailable" class="result hidden" aria-live="polite">
        <strong class="blocked" data-i18n="blocked">Blocked</strong>
        <p class="muted" data-i18n="setupUnavailable">This setup widget is missing a confirmation id. Reopen CodeCut setup from Codex.</p>
      </section>

      <form id="workspace-form">
        <fieldset aria-labelledby="project-section-title">
          <h2 id="project-section-title" class="section-heading" data-i18n="project">Project</h2>
          <label>
            <span data-i18n="projectName">Project name</span>
            <input id="project-name" name="projectName" autocomplete="off" data-i18n-placeholder="projectNamePlaceholder">
          </label>
          <label>
            <span data-i18n="taskType">Task type</span>
            <select id="task-type" name="taskType">
              <option value="template_draft" data-i18n="taskTypeTemplateDraft">Template draft</option>
              <option value="template_import" data-i18n="taskTypeTemplateImport">Template import</option>
              <option value="template_apply_sample" data-i18n="taskTypeTemplateApplySample">Apply template sample</option>
              <option value="edit_execution" data-i18n="taskTypeEditExecution">Edit execution</option>
            </select>
          </label>
        </fieldset>

        <fieldset aria-labelledby="source-section-title">
          <h2 id="source-section-title" class="section-heading" data-i18n="source">Source</h2>
          <div id="media-sources" class="media-sources media-sources-list" role="list"></div>
          <input id="media-file-picker" class="file-picker-input" type="file" multiple>
          <input id="media-folder-picker" class="file-picker-input" type="file" webkitdirectory multiple>
          <p id="file-picker-selection" class="muted"></p>
          <div class="row-actions">
            <button id="add-media-source-button" class="secondary" type="button" data-i18n="addMediaSource">Add files</button>
            <button id="add-media-folder-button" class="secondary" type="button" data-i18n="addMediaFolder">Add folder</button>
          </div>
        </fieldset>

        <fieldset aria-labelledby="output-section-title">
          <h2 id="output-section-title" class="section-heading" data-i18n="output">Output</h2>
          <div class="grid">
            <label>
              <span data-i18n="targetAspectRatio">Target aspect ratio</span>
              <select id="target-aspect-ratio" name="targetAspectRatio">
                <option value="9:16" data-i18n="aspectVertical">9:16</option>
                <option value="16:9" data-i18n="aspectHorizontal">16:9</option>
                <option value="1:1" data-i18n="aspectSquare">1:1</option>
              </select>
            </label>
            <label>
              <span data-i18n="durationGoalRange">Duration</span>
              <select id="duration-goal-range" name="durationGoalRange">
                <option value="auto" data-i18n="durationGoalAuto">Auto</option>
                <option value="15-30" data-i18n="durationRange15To30">15-30 seconds</option>
                <option value="30-60" data-i18n="durationRange30To60">30-60 seconds</option>
                <option value="60-180" data-i18n="durationRange1To3Minutes">1-3 minutes</option>
              </select>
            </label>
            <label>
              <span data-i18n="captionLanguage">Caption language</span>
              <select id="caption-language" name="captionLanguage">
                <option value="auto" data-i18n="captionAuto">auto</option>
                <option value="zh-CN" data-i18n="captionChinese">Chinese</option>
                <option value="en" data-i18n="captionEnglish">English</option>
                <option value="ja" data-i18n="captionJapanese">Japanese</option>
                <option value="ko" data-i18n="captionKorean">Korean</option>
                <option value="es" data-i18n="captionSpanish">Spanish</option>
              </select>
            </label>
            <label>
              <span data-i18n="captionFont">Caption font</span>
              <select id="caption-font" name="captionFont">
                <option value="auto" data-i18n="captionFontAuto">Follow preset</option>
                <!-- CODECUT_CAPTION_FONT_OPTIONS -->
              </select>
            </label>
            <label>
              <span data-i18n="captionSize">Caption size</span>
              <select id="caption-size" name="captionSize">
                <option value="small" data-i18n="captionSizeSmall">Small</option>
                <option value="medium" data-i18n="captionSizeMedium">Medium</option>
                <option value="large" data-i18n="captionSizeLarge">Large</option>
              </select>
            </label>
            <label>
              <span data-i18n="captionStylePreset">Preset style</span>
              <select id="caption-style-preset" name="captionStylePreset">
                <option value="creator-clean" data-i18n="captionStyleCreatorClean">Creator clean</option>
                <option value="short-form-bold" data-i18n="captionStyleShortFormBold">Short-form bold</option>
                <option value="black-bar" data-i18n="captionStyleBlackBar">Black bar</option>
                <option value="talking-head-pop" data-i18n="captionStyleTalkingHeadPop">Talking head pop</option>
                <option value="tutorial-clean" data-i18n="captionStyleTutorialClean">Tutorial clean</option>
                <option value="documentary-soft" data-i18n="captionStyleDocumentarySoft">Documentary soft</option>
                <option value="property-clean-yellow" data-i18n="captionStylePropertyCleanYellow">Property clean yellow</option>
                <option value="product-punch" data-i18n="captionStyleProductPunch">Product punch</option>
                <option value="lifestyle-warm" data-i18n="captionStyleLifestyleWarm">Lifestyle warm</option>
                <option value="cinematic-serif" data-i18n="captionStyleCinematicSerif">Cinematic serif</option>
                <option value="social-highlight" data-i18n="captionStyleSocialHighlight">Social highlight</option>
                <option value="comment-bubble" data-i18n="captionStyleCommentBubble">Comment bubble</option>
                <option value="minimal-reel" data-i18n="captionStyleMinimalReel">Minimal reel</option>
              </select>
            </label>
            <label>
              <span data-i18n="transitionPreference">Transition animation</span>
              <select id="transition-preference" name="transitionPreference">
                <option value="auto" data-i18n="transitionPreferenceAuto">Auto - Agent decides</option>
                <option value="none" data-i18n="transitionPreferenceNone">None</option>
                <option value="fade" data-i18n="transitionPreferenceFade">Fade</option>
                <option value="dissolve" data-i18n="transitionPreferenceDissolve">Dissolve</option>
                <option value="wipe-left" data-i18n="transitionPreferenceWipeLeft">Wipe left</option>
                <option value="wipe-right" data-i18n="transitionPreferenceWipeRight">Wipe right</option>
                <option value="wipe-up" data-i18n="transitionPreferenceWipeUp">Wipe up</option>
                <option value="wipe-down" data-i18n="transitionPreferenceWipeDown">Wipe down</option>
                <option value="slide-left" data-i18n="transitionPreferenceSlideLeft">Slide left</option>
                <option value="slide-right" data-i18n="transitionPreferenceSlideRight">Slide right</option>
                <option value="slide-up" data-i18n="transitionPreferenceSlideUp">Slide up</option>
                <option value="slide-down" data-i18n="transitionPreferenceSlideDown">Slide down</option>
                <option value="zoom-in" data-i18n="transitionPreferenceZoomIn">Zoom in</option>
                <option value="zoom-out" data-i18n="transitionPreferenceZoomOut">Zoom out</option>
              </select>
            </label>
            <label>
              <span data-i18n="templatePreference">Template</span>
              <select id="template-preference-mode" name="templatePreferenceMode">
                <option value="auto" data-i18n="templatePreferenceAuto">Auto match</option>
                <option value="specified" data-i18n="templatePreferenceSpecified">Specified template</option>
              </select>
            </label>
            <label>
              <span data-i18n="requestedTemplate">Requested template</span>
              <input id="requested-template" name="requestedTemplate" type="text" data-i18n-placeholder="requestedTemplatePlaceholder">
            </label>
            <label>
              <span data-i18n="format">Format</span>
              <select id="output-format" name="outputFormat">
                <option value="mp4">mp4</option>
                <option value="webm">webm</option>
              </select>
            </label>
            <label>
              <span data-i18n="quality">Quality</span>
              <select id="output-quality" name="outputQuality">
                <option value="low" data-i18n="qualityLow">low</option>
                <option value="medium" data-i18n="qualityMedium">medium</option>
                <option value="high" data-i18n="qualityHigh">high</option>
                <option value="very_high" data-i18n="qualityVeryHigh">very_high</option>
              </select>
            </label>
            <label>
              <span data-i18n="includeAudio">Include audio</span>
              <select id="include-audio" name="includeAudio">
                <option value="true" data-i18n="yes">true</option>
                <option value="false" data-i18n="no">false</option>
              </select>
            </label>
            <label>
              <span data-i18n="voicePack">Voiceover voice</span>
              <select id="voice-pack" name="voicePack">
                <option value="none" data-i18n="voicePackNone">No voiceover</option>
                <option value="podcast-female" data-i18n="voicePackPodcastFemale">Female voice</option>
                <option value="podcast-male" data-i18n="voicePackPodcastMale">Male voice</option>
              </select>
            </label>
          </div>
          <label class="switch-row" for="generate-intro-cover">
            <input id="generate-intro-cover" name="generateIntroCover" type="checkbox">
            <span class="switch-copy">
              <span data-i18n="introCoverRecommended">Generate a new cover with AI</span>
            </span>
          </label>
        </fieldset>

        <fieldset aria-labelledby="intent-section-title">
          <h2 id="intent-section-title" class="section-heading" data-i18n="intent">Intent</h2>
          <div class="intent-field">
            <span id="requirements-label" data-i18n="requirements">Requirements</span>
            <div id="requirement-options" class="choice-options"></div>
            <textarea id="requirements" class="hidden" name="requirements" aria-labelledby="requirements-label" data-i18n-placeholder="requirementsCustomPlaceholder"></textarea>
          </div>
        </fieldset>

        <div class="actions">
          <button id="submit-button" class="create-project-cta" type="submit" data-i18n="createProject">Create project</button>
        </div>
      </form>

      <section id="result" class="result hidden" aria-live="polite"></section>
      <section id="follow-up" class="follow-up hidden" aria-live="polite"></section>
    </main>

        let currentProjectId = "";

        let activeLanguage = "en";

        function normalizeUiLanguage(value) {
          const language = String(value || "").trim().toLowerCase();
          return language.startsWith("zh") ? "zh-CN" : "en";
        }

        function t(key) {
          return WORKSPACE_I18N[activeLanguage]?.[key] || WORKSPACE_I18N.en[key] || key;
        }

        function applyLanguage(defaults) {
          activeLanguage = normalizeUiLanguage(
            defaults.uiLanguage || defaults.locale || navigator.language,
          );
          document.documentElement.lang = activeLanguage;
          document.querySelectorAll("[data-i18n]").forEach((node) => {
            node.textContent = t(node.dataset.i18n);
          });
          document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
            node.placeholder = t(node.dataset.i18nPlaceholder);
          });
        }

        function intentDefaultsFromPayload(payload) {
          if (!payload || typeof payload !== "object") return null;
          return (
            payload.intentDefaults ||
            payload.widgetData?.intentDefaults ||
            payload.structuredContent?.intentDefaults ||
            payload._meta?.widgetData?.intentDefaults ||
            null
          );
        }

        function pendingConfirmationIdFromPayload(payload) {
          if (!payload || typeof payload !== "object") return "";
          return (
            payload.pendingConfirmationId ||
            payload.widgetData?.pendingConfirmationId ||
            payload.structuredContent?.pendingConfirmationId ||
            payload._meta?.widgetData?.pendingConfirmationId ||
            payload.toolResponseMetadata?.widgetData?.pendingConfirmationId ||
            ""
          );
        }

        function initialDefaults() {
          const api = window.openai || {};
          currentPendingConfirmationId =
            pendingConfirmationIdFromPayload(api.toolResponseMetadata?.widgetData) ||
            pendingConfirmationIdFromPayload(api.toolResponseMetadata) ||
            pendingConfirmationIdFromPayload(api.widgetData) ||
            pendingConfirmationIdFromPayload(api.toolOutput) ||
            pendingConfirmationIdFromPayload(api.structuredContent) ||
            "";
          return (
            api.toolResponseMetadata?.widgetData?.intentDefaults ||
            intentDefaultsFromPayload(api.widgetData) ||
            api.toolOutput?.intentDefaults ||
            intentDefaultsFromPayload(api.toolOutput) ||
            intentDefaultsFromPayload(api.structuredContent) ||
            {}
          );
        }

        function slugify(value) {
          const base = String(value || "codecut-project")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "")
            .slice(0, 42) || "codecut-project";
          const suffix = Date.now().toString(36).slice(-6);
          return `${base}-${suffix}`.slice(0, 64).replace(/-+$/g, "");
        }

        function applyDefaults(defaults) {
          fields.projectName.value = defaults.projectName || "";
          currentProjectId = defaults.projectId || slugify(fields.projectName.value);
          currentDurationContract = normalizeDurationContract(defaults.durationContract, defaults);
          setSelectValue(fields.taskType, defaults.taskType || "edit_execution");
          renderMediaSources(defaults.mediaSources || defaults.mediaSource || []);
          setSelectValue(fields.targetAspectRatio, defaults.targetAspectRatio || "9:16");
          setDurationGoalSelection(defaults);
          setSelectValue(fields.captionLanguage, defaults.captionLanguage || "auto");
          setSelectValue(fields.captionFont, defaults.output?.captionFont || "auto");
          setSelectValue(fields.captionSize, defaults.output?.captionSize || "medium");
          setSelectValue(fields.captionStylePreset, defaults.output?.captionStylePreset || "creator-clean");
          setSelectValue(fields.transitionPreference, defaults.transitionPreference || "auto");
          setSelectValue(fields.templatePreferenceMode, defaults.templatePreference?.mode || "auto");
          fields.requestedTemplate.value = defaults.templatePreference?.mode === "specified"
            ? String(defaults.templatePreference.requestedTemplate || "")
            : "";
          setSelectValue(fields.outputFormat, defaults.output?.format || "mp4");
          setSelectValue(fields.outputQuality, defaults.output?.quality || "high");
          setSelectValue(fields.includeAudio, defaults.output?.includeAudio === false ? "false" : "true");
          setSelectValue(fields.voicePack, defaults.output?.voicePackId || "none");
          fields.generateIntroCover.checked = defaults.generateIntroCover !== false;
          renderChoiceOptions(fields.requirementOptions, defaults.requirementOptions || [defaults.requirements || t("requirementsPlaceholder")], defaults.recommendedRequirementOptions || [], fields.requirements);
          fields.requirements.value = "";
          resetReadyState();
        }

        function setSelectValue(select, value) {
          const normalized = String(value || "");
          if (!normalized) return;
          const hasOption = Array.from(select.options).some((option) => option.value === normalized);
          if (!hasOption) {
            const option = document.createElement("option");
            option.value = normalized;
            option.textContent = normalized;
            select.appendChild(option);
          }
          select.value = normalized;
        }

        function resetReadyState() {
          if (setupSubmitted) {
            fields.submitButton.disabled = true;
            fields.submitButton.textContent = t("projectCreated");
            return;
          }
          fields.submitButton.disabled = false;
          fields.submitButton.textContent = t("createProject");
        }

        function renderMediaSources(mediaSources) {
          clearMediaSourceRows();
          normalizeMediaFileSources(mediaSources).forEach((mediaSource) => appendMediaFileRow(mediaSource));
          refreshMediaSourcesEmptyState();
        }

        function normalizeMediaFileSources(mediaSources) {
          const sourceList = Array.isArray(mediaSources)
            ? mediaSources
            : mediaSources
              ? [mediaSources]
              : [];
          return sourceList.map(normalizeMediaFileSource).filter(Boolean);
        }

        function normalizeMediaFileSource(mediaSource) {
          if (typeof mediaSource === "string") {
            const filePath = mediaSource.trim();
            return filePath ? { kind: "filePath", filePath } : null;
          }
          if (!mediaSource || typeof mediaSource !== "object") return null;
          const filePath = String(
            mediaSource.filePath || mediaSource.path || mediaSource.absolutePath || "",
          ).trim();
          const directoryPath = String(
            mediaSource.directoryPath || mediaSource.folderPath || "",
          ).trim();
          const url = String(mediaSource.url || "").trim();
          if (!filePath && !directoryPath && !url) return null;
          if (directoryPath) {
            return {
              kind: "directoryPath",
              directoryPath,
            };
          }
          if (url) {
            return {
              kind: "url",
              url,
            };
          }
          return {
            kind: "filePath",
            filePath,
            previewUrl: String(mediaSource.previewUrl || ""),
            previewObjectUrl: mediaSource.previewObjectUrl === true,
            previewMimeType: String(mediaSource.previewMimeType || ""),
          };
        }

        function appendMediaFileRow(mediaSource = { kind: "filePath", filePath: "" }) {
          fields.mediaSources.querySelector('[data-role="empty-media-sources"]')?.remove();
          const row = document.createElement("div");
          row.className = "media-source-row";
          row.setAttribute("role", "listitem");
          row.dataset.kind = mediaSource.kind || "filePath";
          row.dataset.filePath = mediaSource.filePath || "";
          row.dataset.directoryPath = mediaSource.directoryPath || "";
          row.dataset.url = mediaSource.url || "";
          row.dataset.previewUrl = mediaSource.previewUrl || "";
          row.dataset.previewObjectUrl = mediaSource.previewObjectUrl === true ? "true" : "false";
          const sourcePath = row.dataset.directoryPath || row.dataset.filePath || row.dataset.url;
          row.innerHTML = `
            <div class="media-source-thumbnail" data-role="thumbnail" aria-hidden="true"></div>
            <div class="media-source-path" title="${escapeAttribute(sourcePath)}">
              <code>${escapeHtml(sourcePath)}</code>
            </div>
            <div class="row-actions">
              <button class="media-source-remove-button" type="button" data-action="remove-source" aria-label="${escapeAttribute(t("removeMediaSource"))}" title="${escapeAttribute(t("removeMediaSource"))}">X</button>
            </div>
          `;
          row.querySelector('[data-action="remove-source"]').addEventListener("click", () => {
            revokeMediaPreviewUrl(row);
            row.remove();
            refreshMediaSourcesEmptyState();
            resetReadyState();
          });
          fields.mediaSources.appendChild(row);
          renderMediaSourceThumbnail(row, mediaSource);
          refreshMediaSourcesEmptyState();
        }

        function renderMediaSourceThumbnail(row, mediaSource = {}) {
          const thumbnail = row.querySelector('[data-role="thumbnail"]');
          thumbnail.innerHTML = "";
          const previewUrl = row.dataset.previewUrl || "";
          const pathValue = row.dataset.directoryPath || row.dataset.filePath || row.dataset.url || "";
          const mediaType = String(mediaSource.previewMimeType || "").toLowerCase();
          const previewKind = mediaPreviewKind(previewUrl, mediaType);
          if (previewKind === "image") {
            const image = document.createElement("img");
            image.src = previewUrl;
            image.alt = "";
            thumbnail.appendChild(image);
            return;
          }
          if (previewKind === "video") {
            const video = document.createElement("video");
            video.src = previewUrl;
            video.muted = true;
            video.playsInline = true;
            video.preload = "metadata";
            thumbnail.appendChild(video);
            return;
          }
          const fallback = document.createElement("span");
          fallback.textContent = mediaThumbnailLabel(pathValue);
          thumbnail.appendChild(fallback);
        }

        function mediaPreviewKind(previewUrl, mediaType) {
          if (!previewUrl) return "";
          if (mediaType.startsWith("image/") || /^data:image\//i.test(previewUrl)) return "image";
          if (mediaType.startsWith("video/") || /^data:video\//i.test(previewUrl) || /^blob:/i.test(previewUrl)) return "video";
          return "";
        }

        function mediaThumbnailLabel(value) {
          const source = String(value || "").trim();
          if (!source) return "FILE";
          if (/^https?:\/\//i.test(source)) return "URL";
          if (!source.split(/[\\/]/).filter(Boolean).pop()?.includes(".")) return "DIR";
          const fileName = source.split(/[\\/]/).filter(Boolean).pop() || "";
          const extension = fileName.includes(".") ? fileName.split(".").pop() : "";
          return (extension || "media").slice(0, 5).toUpperCase();
        }

        function refreshMediaSourcesEmptyState() {
          const hasRows = Boolean(fields.mediaSources.querySelector(".media-source-row"));
          const existing = fields.mediaSources.querySelector('[data-role="empty-media-sources"]');
          if (hasRows) {
            existing?.remove();
            return;
          }
          if (existing) return;
          const empty = document.createElement("p");
          empty.className = "muted";
          empty.dataset.role = "empty-media-sources";
          empty.textContent = t("noMediaSources");
          fields.mediaSources.appendChild(empty);
        }

        function clearMediaSourceRows() {
          fields.mediaSources.querySelectorAll(".media-source-row").forEach(revokeMediaPreviewUrl);
          fields.mediaSources.innerHTML = "";
        }

        function revokeMediaPreviewUrl(row) {
          const previewUrl = row.dataset.previewUrl || "";
          if (
            row.dataset.previewObjectUrl === "true" &&
            previewUrl &&
            typeof URL !== "undefined" &&
            typeof URL.revokeObjectURL === "function"
          ) {
            URL.revokeObjectURL(previewUrl);
          }
        }

        function collectMediaSources() {
          return Array.from(fields.mediaSources.querySelectorAll(".media-source-row"))
            .map((row) => {
              if (row.dataset.kind === "directoryPath") {
                return {
                  kind: "directoryPath",
                  directoryPath: String(row.dataset.directoryPath || "").trim(),
                };
              }
              if (row.dataset.kind === "url") {
                return {
                  kind: "url",
                  url: String(row.dataset.url || "").trim(),
                };
              }
              return {
                kind: "filePath",
                filePath: String(row.dataset.filePath || "").trim(),
              };
            })
            .filter((mediaSource) => mediaSource.filePath || mediaSource.directoryPath || mediaSource.url);
        }

        function appendPickedFileRows(files) {
          const pickedFiles = Array.from(files || []);
          if (!pickedFiles.length) return;
          for (const file of pickedFiles) {
            appendMediaFileRow({
              kind: "filePath",
              filePath: pickedFilePath(file),
              ...createPickedFilePreview(file),
            });
          }
        }

        function createPickedFilePreview(file) {
          const mediaType = String(file?.type || "");
          if (!/^image\//i.test(mediaType) && !/^video\//i.test(mediaType)) {
            return {};
          }
          if (typeof URL === "undefined" || typeof URL.createObjectURL !== "function") {
            return {};
          }
          return {
            previewUrl: URL.createObjectURL(file),
            previewObjectUrl: true,
            previewMimeType: mediaType,
          };
        }

        function selectedFileName(file) {
          return file?.name || file?.fileName || file?.file_name || pickedFilePath(file);
        }

        async function handleHostSelectedFiles(result) {
          const files = Array.isArray(result) ? result : result?.files;
          const normalizedFiles = Array.from(files || []);
          if (!normalizedFiles.length) return false;
          const mediaSources = normalizedFiles
            .map((file) => ({
              kind: "filePath",
              filePath: pickedFilePath(file),
              ...createPickedFilePreview(file),
            }))
            .filter((mediaSource) => mediaSource.filePath);
          if (!mediaSources.length) return false;
          const names = normalizedFiles.map((file) => selectedFileName(file)).filter(Boolean);
          fields.filePickerSelection.textContent = names.length
            ? `${t("selectedFiles")}: ${names.join(", ")}. ${t("selectedFilesNeedAbsolutePath")}`
            : "";
          for (const mediaSource of mediaSources) {
            appendMediaFileRow(mediaSource);
          }
          resetReadyState();
          return true;
        }

        async function handleHostSelectedFolders(result) {
          const folders = Array.isArray(result)
            ? result
            : result?.directories || result?.folders || result?.files;
          const mediaSources = Array.from(folders || [])
            .map(normalizeSelectedFolder)
            .filter(Boolean);
          if (!mediaSources.length) return false;
          fields.filePickerSelection.textContent =
            `${t("selectedFolders")}: ${mediaSources.map((source) => source.directoryPath).join(", ")}. ${t("selectedFoldersAdded")}`;
          for (const mediaSource of mediaSources) {
            appendMediaFileRow(mediaSource);
          }
          resetReadyState();
          return true;
        }

        async function openHostFilePicker() {
          const api = window.openai || {};
          if (typeof api.selectFiles !== "function") {
            fields.mediaFilePicker.click();
            return;
          }
          try {
            const result = await api.selectFiles({
              multiple: true,
              accept: "video/*,audio/*,image/*",
            });
            if (!(await handleHostSelectedFiles(result))) {
              fields.mediaFilePicker.click();
            }
          } catch (error) {
            fields.filePickerSelection.textContent = error instanceof Error ? error.message : String(error);
            fields.mediaFilePicker.click();
          }
        }

        async function openHostFolderPicker() {
          const api = window.openai || {};
          if (typeof api.selectFiles !== "function") {
            fields.mediaFolderPicker.click();
            return;
          }
          try {
            const result = await api.selectFiles({
              multiple: true,
              directory: true,
              directories: true,
            });
            if (!(await handleHostSelectedFolders(result))) {
              fields.mediaFolderPicker.click();
            }
          } catch (error) {
            fields.filePickerSelection.textContent = error instanceof Error ? error.message : String(error);
            fields.mediaFolderPicker.click();
          }
        }

        function normalizeSelectedFolder(folder) {
          if (typeof folder === "string") {
            const directoryPath = folder.trim();
            return directoryPath ? { kind: "directoryPath", directoryPath } : null;
          }
          if (!folder || typeof folder !== "object") return null;
          const directoryPath = String(
            folder.directoryPath || folder.folderPath || folder.path || folder.absolutePath || "",
          ).trim();
          if (directoryPath) {
            return { kind: "directoryPath", directoryPath };
          }
          const relativePath = String(folder.webkitRelativePath || "").trim();
          const rootDirectory = relativePath.split("/").filter(Boolean)[0] || "";
          if (rootDirectory) {
            return { kind: "directoryPath", directoryPath: rootDirectory };
          }
          return folder.name ? { kind: "directoryPath", directoryPath: folder.name } : null;
        }

        function pickedFilePath(file) {
          const filePath = file?.path;
          if (typeof filePath === "string" && filePath.trim()) {
            return filePath.trim();
          }
          const hostFilePath = typeof file?.filePath === "string" ? file.filePath.trim() : "";
          if (hostFilePath) {
            return hostFilePath;
          }
          const absolutePath = typeof file?.absolutePath === "string" ? file.absolutePath.trim() : "";
          if (absolutePath) {
            return absolutePath;
          }
          return file?.name || "";
        }

        function directorySourceFromPickedFolder(files) {
          const pickedFiles = Array.from(files || []);
          const firstFile = pickedFiles.find((file) => file?.webkitRelativePath) || pickedFiles[0];
          if (!firstFile) return null;
          return normalizeSelectedFolder(firstFile);
        }

        function handlePickedFiles() {
          const files = Array.from(fields.mediaFilePicker.files || []);
          const names = files.map((file) => file.name).filter(Boolean);
          fields.filePickerSelection.textContent = names.length
            ? `${t("selectedFiles")}: ${names.join(", ")}. ${t("selectedFilesNeedAbsolutePath")}`
            : "";
          appendPickedFileRows(files);
          resetReadyState();
        }

        function handlePickedFolder() {
          const mediaSource = directorySourceFromPickedFolder(fields.mediaFolderPicker.files);
          if (mediaSource) {
            appendMediaFileRow(mediaSource);
            fields.filePickerSelection.textContent =
              `${t("selectedFolders")}: ${mediaSource.directoryPath}. ${t("selectedFoldersAdded")}`;
          }
          fields.mediaFolderPicker.value = "";
        }

        function renderChoiceOptions(container, options, recommendedValues = "", customField) {
          container.innerHTML = "";
          const normalizedOptions = normalizeChoiceOptions(options);
          const recommendedChoices = recommendedChoiceSet(normalizedOptions, recommendedValues);
          for (const optionText of normalizedOptions) {
            const isRecommendedChoice = recommendedChoices.has(optionText);
            const button = document.createElement("button");
            button.type = "button";
            button.className = isRecommendedChoice ? "choice-option is-active" : "choice-option";
            button.dataset.choiceOption = optionText;
            button.setAttribute("aria-pressed", isRecommendedChoice ? "true" : "false");
            button.textContent = optionText;
            button.addEventListener("click", () => {
              const isActive = button.getAttribute("aria-pressed") === "true";
              button.setAttribute("aria-pressed", isActive ? "false" : "true");
              button.classList.toggle("is-active", !isActive);
              resetReadyState();
            });
            container.appendChild(button);
          }
          appendCustomChoiceOption(container, customField);
        }

        function appendCustomChoiceOption(container, customField) {
          if (!customField) return;
          const customButton = document.createElement("button");
          customButton.type = "button";
          customButton.className = "choice-option";
          customButton.dataset.action = "toggle-custom";
          customButton.setAttribute("aria-expanded", customField.classList.contains("hidden") ? "false" : "true");
          customButton.textContent = t("customOption");
          customButton.addEventListener("click", () => {
            toggleCustomField(customField, customButton);
          });
          container.appendChild(customButton);
        }

        function recommendedChoiceSet(options, recommendedValues) {
          if (!options.length) return new Set();
          const recommendedKeys = new Set(normalizeChoiceOptions(
            Array.isArray(recommendedValues) ? recommendedValues : [recommendedValues],
          ).map(choiceKey));
          return new Set(options.filter((optionText) => recommendedKeys.has(choiceKey(optionText))));
        }

        function choiceKey(value) {
          return String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[。.!?？\s]/g, "");
        }

        function normalizeChoiceOptions(options) {
          return [
            ...new Set(
              (Array.isArray(options) ? options : [])
                .flatMap((option) => atomizeChoiceOption(option))
                .filter(Boolean),
            ),
          ];
        }

        function atomizeChoiceOption(option) {
          const value = String(option || "")
            .trim()
            .replace(/可读字幕和自然音频/g, "可读字幕，自然音频")
            .replace(/readable captions and natural audio/gi, "readable captions, natural audio");
          if (!value) return [];
          const parts = value
            .replace(/[。.!?？]/g, "")
            .split(/[，,、；;]/)
            .map((part) => part.trim())
            .filter(Boolean);
          return parts.length > 1 ? parts : [value];
        }

        function collectChoiceText(container, customField) {
          const selected = Array.from(container.querySelectorAll(".choice-option[aria-pressed='true']"))
            .map((button) => button.dataset.choiceOption.trim())
            .filter(Boolean);
          const custom = customField.value.trim();
          return [...selected, ...(custom ? [custom] : [])].join("\n");
        }

        function toggleCustomField(field, trigger) {
          field.classList.toggle("hidden");
          const expanded = !field.classList.contains("hidden");
          trigger?.setAttribute("aria-expanded", expanded ? "true" : "false");
          trigger?.classList.toggle("is-active", expanded);
          if (!field.classList.contains("hidden")) {
            field.focus();
          }
          resetReadyState();
        }

        function setDurationGoalSelection(defaults) {
          const range = defaults.durationGoalRangeSeconds || {};
          const value = durationGoalSelectionForRange(
            defaults.durationGoalMode,
            range.minSeconds,
            range.maxSeconds,
          );
          setSelectValue(fields.durationGoalRange, value);
        }

        function collectIntroCoverChoice() {
          return fields.generateIntroCover.checked;
        }

        function durationGoalSelectionForRange(mode, minSeconds, maxSeconds) {
          if (mode !== "custom") return "auto";
          const rangeKey = `${Number(minSeconds)}-${Number(maxSeconds)}`;
          return ["15-30", "30-60", "60-180"].includes(rangeKey) ? rangeKey : "auto";
        }

        function collectDurationGoal() {
          const value = fields.durationGoalRange.value;
          if (value === "auto") {
            return { durationGoalMode: "auto" };
          }
          const [minSeconds, maxSeconds] = value.split("-").map(Number);
          return {
            durationGoalMode: "custom",
            durationGoalRangeSeconds: { minSeconds, maxSeconds },
          };
        }

        function normalizePositiveNumber(value) {
          const number = Number(value);
          return Number.isFinite(number) && number > 0 ? number : undefined;
        }

        function normalizeDurationContract(contract, durationGoal) {
          const input = contract && typeof contract === "object" ? contract : {};
          const sourceDurationSeconds = normalizePositiveNumber(input.sourceDurationSeconds);
          return {
            totalDurationMode: ["auto", "preserve_source", "custom_range"].includes(input.totalDurationMode)
              ? input.totalDurationMode
              : durationGoal?.durationGoalMode === "custom"
                ? "custom_range"
                : "auto",
            sourceCoverageMode: ["selected_segments", "full_source"].includes(input.sourceCoverageMode)
              ? input.sourceCoverageMode
              : "selected_segments",
            ...(sourceDurationSeconds === undefined ? {} : { sourceDurationSeconds }),
            toleranceSeconds: normalizePositiveNumber(input.toleranceSeconds) || 0.2,
          };
        }

        function collectDurationContract(durationGoal) {
          const existing = normalizeDurationContract(currentDurationContract, durationGoal);
          if (
            existing.totalDurationMode === "preserve_source" ||
            existing.sourceCoverageMode === "full_source"
          ) {
            return existing;
          }
          return normalizeDurationContract(null, durationGoal);
        }

        function collectTemplatePreference() {
          if (fields.templatePreferenceMode.value === "specified") {
            return {
              mode: "specified",
              requestedTemplate: fields.requestedTemplate.value.trim(),
            };
          }
          return { mode: "auto" };
        }

        function collectIntent() {
          const mediaSources = collectMediaSources();
          const durationGoal = collectDurationGoal();
          return {
            pendingConfirmationId: currentPendingConfirmationId,
            confirmedByUser: true,
            projectId: currentProjectId || slugify(fields.projectName.value),
            projectName: fields.projectName.value.trim(),
            taskType: fields.taskType.value,
            mediaSource: mediaSources[0],
            mediaSources,
            targetAspectRatio: fields.targetAspectRatio.value,
            ...durationGoal,
            durationContract: collectDurationContract(durationGoal),
            captionLanguage: fields.captionLanguage.value.trim() || "auto",
            transitionPreference: fields.transitionPreference.value,
            templatePreference: collectTemplatePreference(),
            output: {
              format: fields.outputFormat.value,
              quality: fields.outputQuality.value,
              includeAudio: fields.includeAudio.value === "true",
              captionFont: fields.captionFont.value,
              captionSize: fields.captionSize.value,
              captionStylePreset: fields.captionStylePreset.value,
              voicePackId: fields.voicePack.value,
            },
            generateIntroCover: collectIntroCoverChoice(),
            requirements: collectChoiceText(fields.requirementOptions, fields.requirements),
          };
        }

        const hostToolTimeoutMs = 12000;

        async function withTimeout(operation, timeoutMs, timeoutMessage) {
          let timeoutId;
          try {
            return await Promise.race([
              Promise.resolve().then(operation),
              new Promise((_, reject) => {
                timeoutId = setTimeout(
                  () => reject(new Error(timeoutMessage)),
                  timeoutMs,
                );
              }),
            ]);
          } finally {
            clearTimeout(timeoutId);
          }
        }

        async function callTool(name, args) {
          const api = window.openai;
          if (!api) throw new Error(t("openaiUnavailable"));
          if (typeof api.callServerTool === "function") {
            return withTimeout(
              () => api.callServerTool({ name, arguments: args }),
              hostToolTimeoutMs,
              t("hostToolTimeout"),
            );
          }
          if (typeof api.callTool === "function") {
            return withTimeout(
              () => api.callTool(name, args),
              hostToolTimeoutMs,
              t("hostToolTimeout"),
            );
          }
          throw new Error(t("callToolUnavailable"));
        }

        function structuredContent(result) {
          return result?.structuredContent || result || {};
        }

        function renderChecks(payload) {
          const checks = document.createElement("ul");
          checks.className = "checks";
          for (const check of payload.checks || []) {
            const item = document.createElement("li");
            const title = document.createElement("strong");
            title.textContent = `${check.ok ? t("ok") : t("blocked")}: ${check.label}`;
            title.className = check.ok ? "ok" : "blocked";
            item.appendChild(title);
            if (check.detail) {
              const detail = document.createElement("span");
              detail.className = "muted";
              detail.textContent = check.detail;
              item.appendChild(detail);
            }
            checks.appendChild(item);
          }
          return checks.childElementCount ? checks : null;
        }

        function formatErrorMessage(value, fallback) {
          if (value === undefined || value === null || value === "") return fallback;
          if (value instanceof Error) return value.message || fallback;
          if (typeof value === "string") return value || fallback;
          if (typeof value === "object") {
            const nested = value.message ?? value.error ?? value.detail ?? value.description;
            if (nested !== undefined && nested !== value) {
              return formatErrorMessage(nested, fallback);
            }
            return JSON.stringify(value);
          }
          return String(value);
        }

        function renderBlocked(payload) {
          const blockedPayload = payload || {};
          fields.result.classList.remove("hidden");
          fields.result.innerHTML = "";
          const title = document.createElement("strong");
          title.className = "blocked";
          title.textContent = t("blocked");
          const message = document.createElement("p");
          message.className = "muted";
          message.textContent = formatErrorMessage(
            blockedPayload.error ?? blockedPayload.message,
            t("setupBlocked"),
          );
          fields.result.append(title, message);
          const checks = renderChecks(blockedPayload);
          if (checks) fields.result.appendChild(checks);
        }

        function renderSetupUnavailable() {
          fields.form.classList.add("hidden");
          fields.submitButton.disabled = true;
          fields.setupUnavailable.classList.remove("hidden");
        }

        function renderSubmitting() {
          fields.result.classList.remove("hidden");
          fields.result.innerHTML = "";
          const title = document.createElement("strong");
          title.textContent = t("creating");
          const message = document.createElement("p");
          message.className = "muted";
          message.textContent = t("submittingSetup");
          fields.result.append(title, message);
        }

        async function submit(event) {
          event.preventDefault();
          if (setupSubmitted) {
            resetReadyState();
            return;
          }
          if (!currentPendingConfirmationId) {
            renderSetupUnavailable();
            return;
          }
          fields.submitButton.disabled = true;
          fields.submitButton.textContent = t("creating");
          renderSubmitting();
          try {
            const result = await callTool("submit_codecut_setup", collectIntent());
            const payload = structuredContent(result);
            if (result?.isError || payload.status !== "created") {
              renderBlocked(payload?.status ? payload : { error: payload.error || t("setupFailed") });
              return;
            }
            setupSubmitted = true;
            renderSuccess(payload);
            try {
              await openEditor(payload.editorUrl);
            } catch (error) {
              renderEditorOpenError(error);
            }
            await sendFollowUp(payload.continuePrompt, payload);
          } catch (error) {
            renderBlocked({
              error: formatErrorMessage(error, t("setupFailed")),
            });
          } finally {
            resetReadyState();
          }
        }

        function renderSuccess(payload) {
          const importedMedia = Array.isArray(payload.importedMedia)
            ? payload.importedMedia
            : payload.importedMedia
              ? [payload.importedMedia]
              : [];
          const mediaIds = importedMedia
            .map((media) => media?.id || media?.mediaId)
            .filter(Boolean)
            .join(", ");
          fields.result.classList.remove("hidden");
          fields.result.innerHTML = `
            <h2>${escapeHtml(t("projectCreated"))}</h2>
            <p><strong>projectId:</strong> <code>${escapeHtml(payload.projectId)}</code></p>
            <p><strong>revision:</strong> <code>${escapeHtml(String(payload.revision))}</code></p>
            <p><strong>mediaId:</strong> <code>${escapeHtml(mediaIds)}</code></p>
            <p><strong>editorUrl:</strong> <code>${escapeHtml(payload.editorUrl || "")}</code></p>
            <div class="result-actions">
              <a class="button" id="open-editor-link" href="${escapeAttribute(payload.editorUrl || "#")}" target="_blank" rel="noreferrer">${escapeHtml(t("openEditor"))}</a>
            </div>
          `;
          document.getElementById("open-editor-link").addEventListener("click", async (event) => {
            event.preventDefault();
            try {
              await openEditor(payload.editorUrl);
            } catch (error) {
              renderEditorOpenError(error);
            }
          });
        }

        async function openEditor(editorUrl) {
          if (!editorUrl) return;
          const api = window.openai || {};
          if (typeof api.openExternal === "function") {
            await api.openExternal({ href: editorUrl, redirectUrl: false });
            return;
          }
          throw new Error(t("openEditorFailed"));
        }

        function renderEditorOpenError(error) {
          const existing = document.getElementById("open-editor-error");
          if (existing) existing.remove();
          const message = formatErrorMessage(error, t("openEditorFailed"));
          const errorText = document.createElement("p");
          errorText.id = "open-editor-error";
          errorText.className = "error";
          errorText.textContent = message || t("openEditorFailed");
          const actions = document.getElementById("open-editor-link")?.closest(".result-actions");
          if (actions) {
            actions.insertAdjacentElement("afterend", errorText);
            return;
          }
          fields.result.classList.remove("hidden");
          fields.result.appendChild(errorText);
        }

        async function sendFollowUp(prompt, payload = {}) {
          fields.followUp.classList.remove("hidden");
          fields.followUp.innerHTML = `<strong>${escapeHtml(t("continuing"))}</strong>`;
          let followUpPrompt = "";
          try {
            followUpPrompt = typeof prompt === "string" && prompt.trim() ? prompt : "";
            if (!followUpPrompt) throw new Error(t("missingFollowUpPrompt"));
            const api = window.openai || {};
            if (typeof api.sendFollowUpMessage !== "function") {
              throw new Error(t("followUpUnavailable"));
            }
            await api.sendFollowUpMessage(followUpMessageFromPrompt(followUpPrompt));
            renderFollowUpRequested(payload);
          } catch (error) {
            fields.followUp.innerHTML = "";
            const title = document.createElement("strong");
            title.className = "error";
            title.textContent = formatErrorMessage(error, t("followUpFailed"));
            const recovery = document.createElement("div");
            recovery.innerHTML = followUpRecoveryHtml(payload);
            const pre = document.createElement("pre");
            pre.textContent = followUpPrompt;
            const retry = document.createElement("button");
            retry.type = "button";
            retry.textContent = t("retryFollowUp");
            retry.addEventListener("click", () => sendFollowUp(followUpPrompt, payload));
            if (recovery.innerHTML) {
              fields.followUp.append(title, recovery, pre, retry);
            } else {
              fields.followUp.append(title, pre, retry);
            }
          }
        }

        function followUpMessageFromPrompt(prompt) {
          return {
            role: "user",
            content: [{ type: "text", text: prompt }],
          };
        }

        function followUpRecoveryHtml(payload = {}) {
          const projectId = payload.projectId || payload.intent?.projectId || "";
          const pendingConfirmationId = payload.pendingConfirmationId || payload.intent?.pendingConfirmationId || "";
          return projectId && pendingConfirmationId
            ? `
              <p class="muted">${escapeHtml(t("followUpRecoveryHint"))}</p>
              <p><strong>${escapeHtml(t("recoverSetupLabel"))}:</strong></p>
              <p><strong>projectId:</strong> <code>${escapeHtml(projectId)}</code></p>
              <p><strong>pendingConfirmationId:</strong> <code>${escapeHtml(pendingConfirmationId)}</code></p>
            `
            : "";
        }

        function renderFollowUpRequested(payload = {}) {
          const recovery = followUpRecoveryHtml(payload);
          fields.followUp.innerHTML = `
            <strong class="ok">${escapeHtml(t("followUpRequested"))}</strong>
            ${recovery}
          `;
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function escapeAttribute(value) {
          return escapeHtml(value).replace(/"/g, "&quot;");
        }

        fields.projectName.addEventListener("input", () => {
          currentProjectId = slugify(fields.projectName.value);
          resetReadyState();
        });
        fields.addMediaSourceButton.addEventListener("click", () => {
          openHostFilePicker();
        });
        fields.addMediaFolderButton.addEventListener("click", () => {
          openHostFolderPicker();
        });
        fields.mediaFilePicker.addEventListener("change", handlePickedFiles);
        fields.mediaFolderPicker.addEventListener("change", handlePickedFolder);
        fields.form.addEventListener("input", () => {
          resetReadyState();
        });
        fields.form.addEventListener("submit", submit);

        const defaults = initialDefaults();
        applyLanguage(defaults);
        if (!currentPendingConfirmationId) {
          renderSetupUnavailable();
          return;
        }
        applyDefaults(defaults);
      })();
    </script>
  </body>
</html>
