<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CodeCut Workspace</title>
    <style>
      :root {
        --cc-background: #f7f8f6;
        --cc-surface: #ffffff;
        --cc-surface-muted: #f8faf8;
        --cc-accent: #f4f6f4;
        --cc-foreground: #1c2422;
        --cc-muted-foreground: #59635f;
        --cc-primary: #18231f;
        --cc-primary-foreground: #ffffff;
        --cc-border: #d9dfda;
        --cc-control-border: #cbd4cf;
        --cc-subtle-border: #e1e6e2;
        --cc-disabled-border: #c7cec9;
        --cc-disabled-foreground: #7a8580;
        --cc-disabled-background: #eef1ee;
        --cc-success: #0b6d45;
        --cc-danger: #9d2b22;
        --cc-create-cta-background: #ecfdf3;
        --cc-create-cta-background-hover: #d7fbe6;
        --cc-create-cta-border: #38b56e;
        --cc-create-cta-foreground: #073f29;
        --cc-radius-sm: 6px;
        --cc-radius-md: 8px;
        --cc-radius-pill: 999px;
        --cc-button-height: 38px;
        --cc-button-padding-x: 16px;
        --cc-control-padding-y: 9px;
        --cc-control-padding-x: 10px;
        --cc-space-xs: 6px;
        --cc-space-sm: 8px;
        --cc-space-md: 12px;
        --cc-space-lg: 14px;
        --cc-media-list-max-height: 280px;
        --cc-media-thumbnail-size: 56px;
        color-scheme: light dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--cc-foreground);
        background: var(--cc-background);
      }

      body {
        margin: 0;
        padding: var(--cc-button-padding-x);
      }

      main {
        max-width: 940px;
        margin: 0 auto;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
        line-height: 1.2;
      }

      p {
        margin: 0;
        color: var(--cc-muted-foreground);
      }

      form {
        display: grid;
        gap: var(--cc-space-lg);
        margin-top: var(--cc-button-padding-x);
      }

      fieldset {
        display: grid;
        gap: var(--cc-space-md);
        margin: 0;
        padding: var(--cc-space-lg);
        border: 1px solid var(--cc-border);
        border-radius: var(--cc-radius-md);
        background: var(--cc-surface);
      }

      .intent-field {
        display: grid;
        gap: var(--cc-space-sm);
      }

      .section-heading {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.35;
      }

      label {
        display: grid;
        gap: var(--cc-space-xs);
        font-size: 13px;
        font-weight: 600;
      }

      input,
      select,
      textarea {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid var(--cc-control-border);
        border-radius: var(--cc-radius-sm);
        padding: var(--cc-control-padding-y) var(--cc-control-padding-x);
        font: inherit;
        color: var(--cc-foreground);
        background: var(--cc-surface);
      }

      textarea {
        min-height: 78px;
        resize: vertical;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: var(--cc-space-md);
      }

      .actions,
      .result-actions,
      .row-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      .choice-options {
        display: flex;
        flex-wrap: wrap;
        gap: var(--cc-space-md) var(--cc-space-lg);
      }

      .media-sources {
        display: grid;
        gap: var(--cc-space-sm);
        height: var(--cc-media-list-max-height);
        max-height: var(--cc-media-list-max-height);
        overflow-y: auto;
        padding: var(--cc-space-xs);
        border: 1px solid var(--cc-subtle-border);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-accent);
      }

      .media-source-row {
        display: grid;
        grid-template-columns: var(--cc-media-thumbnail-size) minmax(0, 1fr) auto;
        align-items: center;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--cc-subtle-border);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-surface-muted);
      }

      .media-source-thumbnail {
        display: grid;
        place-items: center;
        width: var(--cc-media-thumbnail-size);
        height: var(--cc-media-thumbnail-size);
        overflow: hidden;
        border: 1px solid var(--cc-control-border);
        border-radius: var(--cc-radius-sm);
        color: var(--cc-muted-foreground);
        background: var(--cc-surface);
        font-size: 11px;
        font-weight: 700;
        line-height: 1;
        text-transform: uppercase;
      }

      .media-source-thumbnail img,
      .media-source-thumbnail video {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .media-source-path {
        min-width: 0;
        color: var(--cc-foreground);
        font-size: 13px;
        line-height: 1.35;
      }

      .media-source-path code {
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .switch-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px;
        border: 1px solid var(--cc-subtle-border);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-surface-muted);
      }

      .switch-row input {
        width: auto;
        margin-top: 2px;
      }

      .switch-copy {
        display: grid;
        gap: 3px;
      }

      .file-picker-input {
        position: absolute;
        width: 1px;
        height: 1px;
        opacity: 0;
        pointer-events: none;
      }

      .choice-option {
        min-width: 76px;
        border-color: var(--cc-primary);
        border-radius: var(--cc-radius-pill);
        padding: 8px 18px;
        color: var(--cc-primary);
        background: var(--cc-surface);
        text-align: center;
      }

      .choice-option.is-active {
        border-color: var(--cc-primary);
        color: var(--cc-primary-foreground);
        background: var(--cc-primary);
      }

      button,
      a.button {
        min-height: var(--cc-button-height);
        border: 1px solid var(--cc-primary);
        border-radius: var(--cc-radius-sm);
        padding: 9px var(--cc-button-padding-x);
        font: inherit;
        font-weight: 650;
        color: var(--cc-primary-foreground);
        background: var(--cc-primary);
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary {
        color: var(--cc-primary);
        background: var(--cc-surface);
      }

      .create-project-cta {
        min-height: 46px;
        border-color: var(--cc-create-cta-border);
        padding: 11px 24px;
        color: var(--cc-create-cta-foreground);
        background: var(--cc-create-cta-background);
        box-shadow: 0 0 0 1px rgba(56, 181, 110, 0.22), 0 10px 24px rgba(7, 63, 41, 0.18);
      }

      .create-project-cta:hover {
        background: var(--cc-create-cta-background-hover);
      }

      button:disabled {
        border-color: var(--cc-disabled-border);
        color: var(--cc-disabled-foreground);
        background: var(--cc-disabled-background);
        cursor: not-allowed;
      }

      .status,
      .result,
      .follow-up {
        border: 1px solid var(--cc-border);
        border-radius: var(--cc-radius-md);
        padding: var(--cc-space-md);
        background: var(--cc-surface);
      }

      .checks {
        display: grid;
        gap: var(--cc-space-sm);
        margin: 10px 0 0;
        padding: 0;
        list-style: none;
      }

      .checks li {
        display: grid;
        gap: 3px;
        padding: var(--cc-space-sm);
        border-radius: var(--cc-radius-sm);
        background: var(--cc-accent);
      }

      .ok {
        color: var(--cc-success);
      }

      .blocked,
      .error {
        color: var(--cc-danger);
      }

      .muted {
        color: var(--cc-muted-foreground);
        font-size: 13px;
      }

      .hidden {
        display: none;
      }

      code,
      pre {
        white-space: pre-wrap;
        overflow-wrap: anywhere;
      }

      @media (max-width: 720px) {
        body {
          padding: var(--cc-space-md);
        }

        .grid {
          grid-template-columns: 1fr;
        }

        .media-source-row {
          grid-template-columns: var(--cc-media-thumbnail-size) minmax(0, 1fr);
        }

        .media-source-row > .row-actions {
          grid-column: 2;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="title">CodeCut Workspace</h1>
      <p data-i18n="subtitle">Review the prefilled editing intent, adjust only if needed, then create the executor project.</p>

      <form id="workspace-form">
        <fieldset aria-labelledby="project-section-title">
          <h2 id="project-section-title" class="section-heading" data-i18n="project">Project</h2>
          <label>
            <span data-i18n="projectName">Project name</span>
            <input id="project-name" name="projectName" autocomplete="off" data-i18n-placeholder="projectNamePlaceholder">
          </label>
        </fieldset>

        <fieldset aria-labelledby="source-section-title">
          <h2 id="source-section-title" class="section-heading" data-i18n="source">Source</h2>
          <div id="media-sources" class="media-sources media-sources-list" role="list"></div>
          <input id="media-file-picker" class="file-picker-input" type="file" multiple>
          <p id="file-picker-selection" class="muted"></p>
          <div class="row-actions">
            <button id="add-media-source-button" class="secondary" type="button" data-i18n="addMediaSource">Add files</button>
          </div>
        </fieldset>

        <fieldset aria-labelledby="output-section-title">
          <h2 id="output-section-title" class="section-heading" data-i18n="output">Output</h2>
          <div class="grid">
            <label>
              <span data-i18n="targetAspectRatio">Target aspect ratio</span>
              <select id="target-aspect-ratio" name="targetAspectRatio">
                <option value="9:16" data-i18n="aspectVertical">9:16</option>
                <option value="16:9" data-i18n="aspectHorizontal">16:9</option>
                <option value="1:1" data-i18n="aspectSquare">1:1</option>
              </select>
            </label>
            <label>
              <span data-i18n="durationGoalSeconds">Duration goal seconds</span>
              <select id="duration-goal-seconds" name="durationGoalSeconds">
                <option value="15">15</option>
                <option value="30">30</option>
                <option value="45">45</option>
                <option value="60">60</option>
                <option value="90">90</option>
                <option value="120">120</option>
              </select>
            </label>
            <label>
              <span data-i18n="captionLanguage">Caption language</span>
              <select id="caption-language" name="captionLanguage">
                <option value="auto" data-i18n="captionAuto">auto</option>
                <option value="zh-CN" data-i18n="captionChinese">Chinese</option>
                <option value="en" data-i18n="captionEnglish">English</option>
                <option value="ja" data-i18n="captionJapanese">Japanese</option>
                <option value="ko" data-i18n="captionKorean">Korean</option>
                <option value="es" data-i18n="captionSpanish">Spanish</option>
              </select>
            </label>
            <label>
              <span data-i18n="format">Format</span>
              <select id="output-format" name="outputFormat">
                <option value="mp4">mp4</option>
                <option value="webm">webm</option>
              </select>
            </label>
            <label>
              <span data-i18n="quality">Quality</span>
              <select id="output-quality" name="outputQuality">
                <option value="low" data-i18n="qualityLow">low</option>
                <option value="medium" data-i18n="qualityMedium">medium</option>
                <option value="high" data-i18n="qualityHigh">high</option>
                <option value="very_high" data-i18n="qualityVeryHigh">very_high</option>
              </select>
            </label>
            <label>
              <span data-i18n="includeAudio">Include audio</span>
              <select id="include-audio" name="includeAudio">
                <option value="true" data-i18n="yes">true</option>
                <option value="false" data-i18n="no">false</option>
              </select>
            </label>
          </div>
          <label class="switch-row" for="generate-intro-cover">
            <input id="generate-intro-cover" name="generateIntroCover" type="checkbox">
            <span class="switch-copy">
              <span data-i18n="introCoverRecommended">Generate opening cover image (recommended)</span>
              <span class="muted" data-i18n="introCoverHelp">Codex uses the first selected frame as visual evidence, generates a separate image, imports it, and places it at the start.</span>
            </span>
          </label>
        </fieldset>

        <fieldset aria-labelledby="intent-section-title">
          <h2 id="intent-section-title" class="section-heading" data-i18n="intent">Intent</h2>
          <div class="intent-field">
            <span id="brief-label" data-i18n="brief">Brief</span>
            <div id="brief-options" class="choice-options"></div>
            <textarea id="brief" class="hidden" name="brief" aria-labelledby="brief-label" data-i18n-placeholder="briefCustomPlaceholder"></textarea>
          </div>
          <div class="intent-field">
            <span id="success-criteria-label" data-i18n="successCriteria">Success criteria</span>
            <div id="success-criteria-options" class="choice-options"></div>
            <textarea id="success-criteria" class="hidden" name="successCriteria" aria-labelledby="success-criteria-label" data-i18n-placeholder="successCriteriaCustomPlaceholder"></textarea>
          </div>
        </fieldset>

        <section class="status" aria-live="polite">
          <strong id="status-title" data-i18n="readyToCreate">Ready to create</strong>
          <p id="status-message" class="muted" data-i18n="defaultsReady">Required fields are prefilled. Change only what you need.</p>
          <ul id="checks" class="checks"></ul>
        </section>

        <div class="actions">
          <button id="submit-button" class="create-project-cta" type="submit" data-i18n="createProject">Create project</button>
        </div>
      </form>

      <section id="result" class="result hidden" aria-live="polite"></section>
      <section id="follow-up" class="follow-up hidden" aria-live="polite"></section>
    </main>

    <script>
      (() => {
        "use strict";

        const WORKSPACE_I18N = {
          en: {
            title: "CodeCut Workspace",
            subtitle: "Review the prefilled editing intent, adjust only if needed, then create the executor project.",
            project: "Project",
            projectName: "Project name",
            projectNamePlaceholder: "CodeCut Project",
            source: "Source",
            addMediaSource: "Add files",
            removeMediaSource: "Remove source",
            noMediaSources: "No media sources selected.",
            selectedFiles: "Selected files",
            selectedFilesNeedAbsolutePath: "Selected files were added to the media list.",
            output: "Output",
            targetAspectRatio: "Target aspect ratio",
            aspectVertical: "9:16 vertical",
            aspectHorizontal: "16:9 horizontal",
            aspectSquare: "1:1 square",
            durationGoalSeconds: "Duration goal seconds",
            captionLanguage: "Caption language",
            captionAuto: "auto",
            captionChinese: "Chinese",
            captionEnglish: "English",
            captionJapanese: "Japanese",
            captionKorean: "Korean",
            captionSpanish: "Spanish",
            format: "Format",
            quality: "Quality",
            qualityLow: "low",
            qualityMedium: "medium",
            qualityHigh: "high",
            qualityVeryHigh: "very_high",
            includeAudio: "Include audio",
            introCoverRecommended: "Generate opening cover image (recommended)",
            introCoverHelp: "Codex uses the first selected frame as visual evidence, generates a separate image, imports it, and places it at the start.",
            yes: "true",
            no: "false",
            intent: "Intent",
            brief: "Brief",
            briefPlaceholder: "Cut a clear short with the key message, readable captions, and natural audio.",
            customOption: "Custom",
            briefCustomPlaceholder: "Add custom brief details.",
            successCriteria: "Success criteria",
            successCriteriaPlaceholder: "Clear hook, tight pacing, readable captions, export-ready ending.",
            successCriteriaCustomPlaceholder: "Add custom success criteria.",
            readyToCreate: "Ready to create",
            defaultsReady: "Required fields are prefilled. Change only what you need.",
            createProject: "Create project",
            blocked: "Blocked",
            ok: "OK",
            setupBlocked: "Resolve the failed fields before creating a project.",
            creating: "Creating",
            creatingDetail: "Creating project and importing media.",
            setupFailed: "CodeCut setup failed.",
            projectCreated: "Project created",
            openEditor: "Open editor",
            openEditorFailed: "Could not open the editor from this widget.",
            continuing: "Continuing in Codex...",
            followUpSent: "Follow-up sent to Codex.",
            followUpUnavailable: "window.openai.sendFollowUpMessage is unavailable.",
            retryFollowUp: "Retry follow-up",

          },
          "zh-CN": {
            title: "CodeCut 工作区",
            subtitle: "确认已预填的剪辑需求，如需修改再调整，然后创建执行器项目。",
            project: "项目",
            projectName: "项目名称",
            projectNamePlaceholder: "CodeCut 项目",
            source: "素材",
            addMediaSource: "添加素材",
            removeMediaSource: "移除素材",
            noMediaSources: "尚未选择素材。",
            selectedFiles: "已选择文件",
            selectedFilesNeedAbsolutePath: "已把选择的文件加入素材列表。",
            output: "输出",
            targetAspectRatio: "目标画幅",
            aspectVertical: "9:16 竖屏",
            aspectHorizontal: "16:9 横屏",
            aspectSquare: "1:1 方形",
            durationGoalSeconds: "目标时长（秒）",
            captionLanguage: "字幕语言",
            captionAuto: "自动识别",
            captionChinese: "中文",
            captionEnglish: "英文",
            captionJapanese: "日文",
            captionKorean: "韩文",
            captionSpanish: "西班牙文",
            format: "格式",
            quality: "质量",
            qualityLow: "低",
            qualityMedium: "中",
            qualityHigh: "高",
            qualityVeryHigh: "很高",
            includeAudio: "包含音频",
            introCoverRecommended: "生成开头封面图（推荐）",
            introCoverHelp: "Codex 会基于首个入选片段的首帧证据单独生成图片，导入后放在视频开头。",
            yes: "是",
            no: "否",
            intent: "剪辑需求",
            brief: "需求说明",
            briefPlaceholder: "剪成节奏清晰的短视频，保留核心信息、可读字幕和自然音频。",
            customOption: "自定义",
            briefCustomPlaceholder: "补充自定义需求。",
            successCriteria: "成功标准",
            successCriteriaPlaceholder: "开头有明确信息点；主体节奏紧凑；字幕清晰；结尾适合继续编辑或导出。",
            successCriteriaCustomPlaceholder: "补充自定义成功标准。",
            readyToCreate: "可创建",
            defaultsReady: "必填项已预填，大部分情况下可直接创建项目。",
            createProject: "创建项目",
            blocked: "已阻塞",
            ok: "通过",
            setupBlocked: "请先解决失败项，再创建项目。",
            creating: "创建中",
            creatingDetail: "正在创建项目并导入素材。",
            setupFailed: "CodeCut 设置失败。",
            projectCreated: "项目已创建",
            openEditor: "打开编辑器",
            openEditorFailed: "无法从当前 widget 打开编辑器。",
            continuing: "正在继续交给 Codex...",
            followUpSent: "已发送后续任务给 Codex。",
            followUpUnavailable: "window.openai.sendFollowUpMessage 不可用。",
            retryFollowUp: "重试发送后续任务",
            openaiUnavailable: "window.openai 不可用。",
            callToolUnavailable: "window.openai.callTool 不可用。",
          },
        };

        const fields = {
          form: document.getElementById("workspace-form"),
          projectName: document.getElementById("project-name"),
          mediaSources: document.getElementById("media-sources"),
          mediaFilePicker: document.getElementById("media-file-picker"),
          filePickerSelection: document.getElementById("file-picker-selection"),
          addMediaSourceButton: document.getElementById("add-media-source-button"),
          targetAspectRatio: document.getElementById("target-aspect-ratio"),
          durationGoalSeconds: document.getElementById("duration-goal-seconds"),
          captionLanguage: document.getElementById("caption-language"),
          outputFormat: document.getElementById("output-format"),
          outputQuality: document.getElementById("output-quality"),
          includeAudio: document.getElementById("include-audio"),
          generateIntroCover: document.getElementById("generate-intro-cover"),
          brief: document.getElementById("brief"),
          briefOptions: document.getElementById("brief-options"),
          successCriteria: document.getElementById("success-criteria"),
          successCriteriaOptions: document.getElementById("success-criteria-options"),
          statusTitle: document.getElementById("status-title"),
          statusMessage: document.getElementById("status-message"),
          checks: document.getElementById("checks"),
          submitButton: document.getElementById("submit-button"),
          result: document.getElementById("result"),
          followUp: document.getElementById("follow-up"),
        };

        let currentProjectId = "";
        let currentPendingConfirmationId = "";
        let activeLanguage = "en";

        function normalizeUiLanguage(value) {
          const language = String(value || "").trim().toLowerCase();
          return language.startsWith("zh") ? "zh-CN" : "en";
        }

        function t(key) {
          return WORKSPACE_I18N[activeLanguage]?.[key] || WORKSPACE_I18N.en[key] || key;
        }

        function applyLanguage(defaults) {
          activeLanguage = normalizeUiLanguage(
            defaults.uiLanguage || defaults.locale || navigator.language,
          );
          document.documentElement.lang = activeLanguage;
          document.querySelectorAll("[data-i18n]").forEach((node) => {
            node.textContent = t(node.dataset.i18n);
          });
          document.querySelectorAll("[data-i18n-placeholder]").forEach((node) => {
            node.placeholder = t(node.dataset.i18nPlaceholder);
          });
        }

        function intentDefaultsFromPayload(payload) {
          if (!payload || typeof payload !== "object") return null;
          return (
            payload.intentDefaults ||
            payload.widgetData?.intentDefaults ||
            payload.structuredContent?.intentDefaults ||
            payload._meta?.widgetData?.intentDefaults ||
            null
          );
        }

        function initialDefaults() {
          const api = window.openai || {};
          currentPendingConfirmationId =
            api.toolResponseMetadata?.widgetData?.pendingConfirmationId ||
            api.widgetData?.pendingConfirmationId ||
            api.toolOutput?.pendingConfirmationId ||
            api.structuredContent?.pendingConfirmationId ||
            "";
          return (
            api.toolResponseMetadata?.widgetData?.intentDefaults ||
            intentDefaultsFromPayload(api.widgetData) ||
            api.toolOutput?.intentDefaults ||
            intentDefaultsFromPayload(api.toolOutput) ||
            intentDefaultsFromPayload(api.structuredContent) ||
            {}
          );
        }

        function slugify(value) {
          const base = String(value || "codecut-project")
            .toLowerCase()
            .replace(/[^a-z0-9]+/g, "-")
            .replace(/^-+|-+$/g, "")
            .slice(0, 42) || "codecut-project";
          const suffix = Date.now().toString(36).slice(-6);
          return `${base}-${suffix}`.slice(0, 64).replace(/-+$/g, "");
        }

        function applyDefaults(defaults) {
          fields.projectName.value = defaults.projectName || "";
          currentProjectId = defaults.projectId || slugify(fields.projectName.value);
          renderMediaSources(defaults.mediaSources || defaults.mediaSource || []);
          setSelectValue(fields.targetAspectRatio, defaults.targetAspectRatio || "9:16");
          setSelectValue(fields.durationGoalSeconds, String(Number(defaults.durationGoalSeconds || 60)));
          setSelectValue(fields.captionLanguage, defaults.captionLanguage || "auto");
          setSelectValue(fields.outputFormat, defaults.output?.format || "mp4");
          setSelectValue(fields.outputQuality, defaults.output?.quality || "high");
          setSelectValue(fields.includeAudio, defaults.output?.includeAudio === false ? "false" : "true");
          fields.generateIntroCover.checked = defaults.generateIntroCover !== false;
          renderChoiceOptions(fields.briefOptions, defaults.briefOptions || [defaults.brief || t("briefPlaceholder")], defaults.brief, fields.brief);
          renderChoiceOptions(
            fields.successCriteriaOptions,
            defaults.successCriteriaOptions || [defaults.successCriteria || t("successCriteriaPlaceholder")],
            defaults.successCriteria,
            fields.successCriteria,
          );
          fields.brief.value = "";
          fields.successCriteria.value = "";
          resetReadyState();
        }

        function setSelectValue(select, value) {
          const normalized = String(value || "");
          if (!normalized) return;
          const hasOption = Array.from(select.options).some((option) => option.value === normalized);
          if (!hasOption) {
            const option = document.createElement("option");
            option.value = normalized;
            option.textContent = normalized;
            select.appendChild(option);
          }
          select.value = normalized;
        }

        function resetReadyState() {
          fields.submitButton.disabled = false;
          fields.statusTitle.textContent = t("readyToCreate");
          fields.statusTitle.className = "";
          fields.statusMessage.textContent = t("defaultsReady");
          fields.checks.innerHTML = "";
        }

        function renderMediaSources(mediaSources) {
          clearMediaSourceRows();
          normalizeMediaFileSources(mediaSources).forEach((mediaSource) => appendMediaFileRow(mediaSource));
          refreshMediaSourcesEmptyState();
        }

        function normalizeMediaFileSources(mediaSources) {
          const sourceList = Array.isArray(mediaSources)
            ? mediaSources
            : mediaSources
              ? [mediaSources]
              : [];
          return sourceList.map(normalizeMediaFileSource).filter(Boolean);
        }

        function normalizeMediaFileSource(mediaSource) {
          if (typeof mediaSource === "string") {
            const filePath = mediaSource.trim();
            return filePath ? { kind: "filePath", filePath } : null;
          }
          if (!mediaSource || typeof mediaSource !== "object") return null;
          const filePath = String(
            mediaSource.filePath || mediaSource.path || mediaSource.absolutePath || "",
          ).trim();
          if (!filePath) return null;
          return {
            kind: "filePath",
            filePath,
            previewUrl: String(mediaSource.previewUrl || ""),
            previewObjectUrl: mediaSource.previewObjectUrl === true,
            previewMimeType: String(mediaSource.previewMimeType || ""),
          };
        }

        function appendMediaFileRow(mediaSource = { kind: "filePath", filePath: "" }) {
          fields.mediaSources.querySelector('[data-role="empty-media-sources"]')?.remove();
          const row = document.createElement("div");
          row.className = "media-source-row";
          row.setAttribute("role", "listitem");
          row.dataset.filePath = mediaSource.filePath || "";
          row.dataset.previewUrl = mediaSource.previewUrl || "";
          row.dataset.previewObjectUrl = mediaSource.previewObjectUrl === true ? "true" : "false";
          row.innerHTML = `
            <div class="media-source-thumbnail" data-role="thumbnail" aria-hidden="true"></div>
            <div class="media-source-path" title="${escapeAttribute(row.dataset.filePath)}">
              <code>${escapeHtml(row.dataset.filePath)}</code>
            </div>
            <div class="row-actions">
              <button class="secondary" type="button" data-action="remove-source">${escapeHtml(t("removeMediaSource"))}</button>
            </div>
          `;
          row.querySelector('[data-action="remove-source"]').addEventListener("click", () => {
            revokeMediaPreviewUrl(row);
            row.remove();
            refreshMediaSourcesEmptyState();
            resetReadyState();
          });
          fields.mediaSources.appendChild(row);
          renderMediaSourceThumbnail(row, mediaSource);
          refreshMediaSourcesEmptyState();
        }

        function renderMediaSourceThumbnail(row, mediaSource = {}) {
          const thumbnail = row.querySelector('[data-role="thumbnail"]');
          thumbnail.innerHTML = "";
          const previewUrl = row.dataset.previewUrl || "";
          const pathValue = row.dataset.filePath || "";
          const mediaType = String(mediaSource.previewMimeType || "").toLowerCase();
          const previewKind = mediaPreviewKind(previewUrl, mediaType);
          if (previewKind === "image") {
            const image = document.createElement("img");
            image.src = previewUrl;
            image.alt = "";
            thumbnail.appendChild(image);
            return;
          }
          if (previewKind === "video") {
            const video = document.createElement("video");
            video.src = previewUrl;
            video.muted = true;
            video.playsInline = true;
            video.preload = "metadata";
            thumbnail.appendChild(video);
            return;
          }
          const fallback = document.createElement("span");
          fallback.textContent = mediaThumbnailLabel(pathValue);
          thumbnail.appendChild(fallback);
        }

        function mediaPreviewKind(previewUrl, mediaType) {
          if (!previewUrl) return "";
          if (mediaType.startsWith("image/") || /^data:image\//i.test(previewUrl)) return "image";
          if (mediaType.startsWith("video/") || /^data:video\//i.test(previewUrl) || /^blob:/i.test(previewUrl)) return "video";
          return "";
        }

        function mediaThumbnailLabel(value) {
          const source = String(value || "").trim();
          if (!source) return "FILE";
          const fileName = source.split(/[\\/]/).filter(Boolean).pop() || "";
          const extension = fileName.includes(".") ? fileName.split(".").pop() : "";
          return (extension || "media").slice(0, 5).toUpperCase();
        }

        function refreshMediaSourcesEmptyState() {
          const hasRows = Boolean(fields.mediaSources.querySelector(".media-source-row"));
          const existing = fields.mediaSources.querySelector('[data-role="empty-media-sources"]');
          if (hasRows) {
            existing?.remove();
            return;
          }
          if (existing) return;
          const empty = document.createElement("p");
          empty.className = "muted";
          empty.dataset.role = "empty-media-sources";
          empty.textContent = t("noMediaSources");
          fields.mediaSources.appendChild(empty);
        }

        function clearMediaSourceRows() {
          fields.mediaSources.querySelectorAll(".media-source-row").forEach(revokeMediaPreviewUrl);
          fields.mediaSources.innerHTML = "";
        }

        function revokeMediaPreviewUrl(row) {
          const previewUrl = row.dataset.previewUrl || "";
          if (
            row.dataset.previewObjectUrl === "true" &&
            previewUrl &&
            typeof URL !== "undefined" &&
            typeof URL.revokeObjectURL === "function"
          ) {
            URL.revokeObjectURL(previewUrl);
          }
        }

        function collectMediaSources() {
          return Array.from(fields.mediaSources.querySelectorAll(".media-source-row"))
            .map((row) => ({
              kind: "filePath",
              filePath: String(row.dataset.filePath || "").trim(),
            }))
            .filter((mediaSource) => mediaSource.filePath);
        }

        function appendPickedFileRows(files) {
          const pickedFiles = Array.from(files || []);
          if (!pickedFiles.length) return;
          for (const file of pickedFiles) {
            appendMediaFileRow({
              kind: "filePath",
              filePath: pickedFilePath(file),
              ...createPickedFilePreview(file),
            });
          }
        }

        function createPickedFilePreview(file) {
          const mediaType = String(file?.type || "");
          if (!/^image\//i.test(mediaType) && !/^video\//i.test(mediaType)) {
            return {};
          }
          if (typeof URL === "undefined" || typeof URL.createObjectURL !== "function") {
            return {};
          }
          return {
            previewUrl: URL.createObjectURL(file),
            previewObjectUrl: true,
            previewMimeType: mediaType,
          };
        }

        function selectedFileName(file) {
          return file?.name || file?.fileName || file?.file_name || pickedFilePath(file);
        }

        async function handleHostSelectedFiles(result) {
          const files = Array.isArray(result) ? result : result?.files;
          const normalizedFiles = Array.from(files || []);
          if (!normalizedFiles.length) return false;
          const mediaSources = normalizedFiles
            .map((file) => ({
              kind: "filePath",
              filePath: pickedFilePath(file),
              ...createPickedFilePreview(file),
            }))
            .filter((mediaSource) => mediaSource.filePath);
          if (!mediaSources.length) return false;
          const names = normalizedFiles.map((file) => selectedFileName(file)).filter(Boolean);
          fields.filePickerSelection.textContent = names.length
            ? `${t("selectedFiles")}: ${names.join(", ")}. ${t("selectedFilesNeedAbsolutePath")}`
            : "";
          for (const mediaSource of mediaSources) {
            appendMediaFileRow(mediaSource);
          }
          resetReadyState();
          return true;
        }

        async function openHostFilePicker() {
          const api = window.openai || {};
          if (typeof api.selectFiles !== "function") {
            fields.mediaFilePicker.click();
            return;
          }
          try {
            const result = await api.selectFiles({
              multiple: true,
              accept: "video/*,audio/*,image/*",
            });
            if (!(await handleHostSelectedFiles(result))) {
              fields.mediaFilePicker.click();
            }
          } catch (error) {
            fields.filePickerSelection.textContent = error instanceof Error ? error.message : String(error);
            fields.mediaFilePicker.click();
          }
        }

        function pickedFilePath(file) {
          const filePath = file?.path;
          if (typeof filePath === "string" && filePath.trim()) {
            return filePath.trim();
          }
          const hostFilePath = typeof file?.filePath === "string" ? file.filePath.trim() : "";
          if (hostFilePath) {
            return hostFilePath;
          }
          const absolutePath = typeof file?.absolutePath === "string" ? file.absolutePath.trim() : "";
          if (absolutePath) {
            return absolutePath;
          }
          return file?.name || "";
        }

        function handlePickedFiles() {
          const files = Array.from(fields.mediaFilePicker.files || []);
          const names = files.map((file) => file.name).filter(Boolean);
          fields.filePickerSelection.textContent = names.length
            ? `${t("selectedFiles")}: ${names.join(", ")}. ${t("selectedFilesNeedAbsolutePath")}`
            : "";
          appendPickedFileRows(files);
          resetReadyState();
        }

        function renderChoiceOptions(container, options, recommendedText = "", customField) {
          container.innerHTML = "";
          const normalizedOptions = normalizeChoiceOptions(options);
          const recommendedChoices = recommendedChoiceSet(normalizedOptions, recommendedText);
          for (const optionText of normalizedOptions) {
            const isRecommendedChoice = recommendedChoices.has(optionText);
            const button = document.createElement("button");
            button.type = "button";
            button.className = isRecommendedChoice ? "choice-option is-active" : "choice-option";
            button.dataset.choiceOption = optionText;
            button.setAttribute("aria-pressed", isRecommendedChoice ? "true" : "false");
            button.textContent = optionText;
            button.addEventListener("click", () => {
              const isActive = button.getAttribute("aria-pressed") === "true";
              button.setAttribute("aria-pressed", isActive ? "false" : "true");
              button.classList.toggle("is-active", !isActive);
              resetReadyState();
            });
            container.appendChild(button);
          }
          appendCustomChoiceOption(container, customField);
        }

        function appendCustomChoiceOption(container, customField) {
          if (!customField) return;
          const customButton = document.createElement("button");
          customButton.type = "button";
          customButton.className = "choice-option";
          customButton.dataset.action = "toggle-custom";
          customButton.setAttribute("aria-expanded", customField.classList.contains("hidden") ? "false" : "true");
          customButton.textContent = t("customOption");
          customButton.addEventListener("click", () => {
            toggleCustomField(customField, customButton);
          });
          container.appendChild(customButton);
        }

        function recommendedChoiceSet(options, recommendedText) {
          if (!options.length) return new Set();
          const recommendedKeys = atomizeChoiceOption(recommendedText).map(choiceKey);
          const selected = options.filter((optionText) => {
            const optionKey = choiceKey(optionText);
            return recommendedKeys.some((recommendedKey) =>
              recommendedKey === optionKey ||
              recommendedKey.includes(optionKey) ||
              optionKey.includes(recommendedKey),
            );
          });
          return new Set(selected.length ? selected : [options[0]]);
        }

        function choiceKey(value) {
          return String(value || "")
            .trim()
            .toLowerCase()
            .replace(/[。.!?？\s]/g, "");
        }

        function normalizeChoiceOptions(options) {
          return [
            ...new Set(
              (Array.isArray(options) ? options : [])
                .flatMap((option) => atomizeChoiceOption(option))
                .filter(Boolean),
            ),
          ];
        }

        function atomizeChoiceOption(option) {
          const value = String(option || "")
            .trim()
            .replace(/可读字幕和自然音频/g, "可读字幕，自然音频")
            .replace(/readable captions and natural audio/gi, "readable captions, natural audio");
          if (!value) return [];
          const parts = value
            .replace(/[。.!?？]/g, "")
            .split(/[，,、；;]/)
            .map((part) => part.trim())
            .filter(Boolean);
          return parts.length > 1 ? parts : [value];
        }

        function collectChoiceText(container, customField) {
          const selected = Array.from(container.querySelectorAll(".choice-option[aria-pressed='true']"))
            .map((button) => button.dataset.choiceOption.trim())
            .filter(Boolean);
          const custom = customField.value.trim();
          return [...selected, ...(custom ? [custom] : [])].join("\n");
        }

        function toggleCustomField(field, trigger) {
          field.classList.toggle("hidden");
          const expanded = !field.classList.contains("hidden");
          trigger?.setAttribute("aria-expanded", expanded ? "true" : "false");
          trigger?.classList.toggle("is-active", expanded);
          if (!field.classList.contains("hidden")) {
            field.focus();
          }
          resetReadyState();
        }

        function collectIntroCoverChoice() {
          return fields.generateIntroCover.checked;
        }

        function collectIntent() {
          const mediaSources = collectMediaSources();
          return {
            pendingConfirmationId: currentPendingConfirmationId,
            projectId: currentProjectId || slugify(fields.projectName.value),
            projectName: fields.projectName.value.trim(),
            mediaSource: mediaSources[0],
            mediaSources,
            targetAspectRatio: fields.targetAspectRatio.value,
            durationGoalSeconds: Number(fields.durationGoalSeconds.value),
            captionLanguage: fields.captionLanguage.value.trim() || "auto",
            output: {
              format: fields.outputFormat.value,
              quality: fields.outputQuality.value,
              includeAudio: fields.includeAudio.value === "true",
            },
            generateIntroCover: collectIntroCoverChoice(),
            brief: collectChoiceText(fields.briefOptions, fields.brief),
            successCriteria: collectChoiceText(fields.successCriteriaOptions, fields.successCriteria),
          };
        }

        async function callTool(name, args) {
          const api = window.openai;
          if (!api) throw new Error(t("openaiUnavailable"));
          if (typeof api.callTool === "function") {
            return api.callTool(name, args);
          }
          if (typeof api.callServerTool === "function") {
            return api.callServerTool({ name, arguments: args });
          }
          throw new Error(t("callToolUnavailable"));
        }

        function structuredContent(result) {
          return result?.structuredContent || result || {};
        }

        function renderChecks(payload) {
          fields.checks.innerHTML = "";
          for (const check of payload.checks || []) {
            const item = document.createElement("li");
            const title = document.createElement("strong");
            title.textContent = `${check.ok ? t("ok") : t("blocked")}: ${check.label}`;
            title.className = check.ok ? "ok" : "blocked";
            item.appendChild(title);
            if (check.detail) {
              const detail = document.createElement("span");
              detail.className = "muted";
              detail.textContent = check.detail;
              item.appendChild(detail);
            }
            fields.checks.appendChild(item);
          }
        }

        function renderBlocked(payload) {
          fields.statusTitle.textContent = t("blocked");
          fields.statusTitle.className = "blocked";
          fields.statusMessage.textContent = payload?.error || payload?.message || t("setupBlocked");
          renderChecks(payload || {});
        }

        async function submit(event) {
          event.preventDefault();
          fields.submitButton.disabled = true;
          fields.statusTitle.textContent = t("creating");
          fields.statusTitle.className = "";
          fields.statusMessage.textContent = t("creatingDetail");
          try {
            const result = await callTool("submit_codecut_setup", collectIntent());
            const payload = structuredContent(result);
            if (result?.isError || payload.status !== "created") {
              renderBlocked(payload?.status ? payload : { error: payload.error || t("setupFailed") });
              return;
            }
            renderSuccess(payload);
            try {
              await openEditor(payload.editorUrl);
            } catch (error) {
              renderEditorOpenError(error);
            }
            await sendFollowUp(payload.continuePrompt);
          } catch (error) {
            renderBlocked({
              error: error instanceof Error ? error.message : String(error),
            });
          } finally {
            fields.submitButton.disabled = false;
          }
        }

        function renderSuccess(payload) {
          const importedMedia = Array.isArray(payload.importedMedia)
            ? payload.importedMedia
            : payload.importedMedia
              ? [payload.importedMedia]
              : [];
          const mediaIds = importedMedia
            .map((media) => media?.id || media?.mediaId)
            .filter(Boolean)
            .join(", ");
          fields.result.classList.remove("hidden");
          fields.result.innerHTML = `
            <h2>${escapeHtml(t("projectCreated"))}</h2>
            <p><strong>projectId:</strong> <code>${escapeHtml(payload.projectId)}</code></p>
            <p><strong>revision:</strong> <code>${escapeHtml(String(payload.revision))}</code></p>
            <p><strong>mediaId:</strong> <code>${escapeHtml(mediaIds)}</code></p>
            <p><strong>editorUrl:</strong> <code>${escapeHtml(payload.editorUrl || "")}</code></p>
            <div class="result-actions">
              <a class="button" id="open-editor-link" href="${escapeAttribute(payload.editorUrl || "#")}" target="_blank" rel="noreferrer">${escapeHtml(t("openEditor"))}</a>
            </div>
          `;
          document.getElementById("open-editor-link").addEventListener("click", async (event) => {
            event.preventDefault();
            try {
              await openEditor(payload.editorUrl);
            } catch (error) {
              renderEditorOpenError(error);
            }
          });
        }

        async function openEditor(editorUrl) {
          if (!editorUrl) return;
          const api = window.openai || {};
          if (typeof api.openExternal === "function") {
            await api.openExternal({ href: editorUrl, redirectUrl: false });
            return;
          }
          throw new Error(t("openEditorFailed"));
        }

        function renderEditorOpenError(error) {
          const existing = document.getElementById("open-editor-error");
          if (existing) existing.remove();
          const message = error instanceof Error ? error.message : String(error);
          const errorText = document.createElement("p");
          errorText.id = "open-editor-error";
          errorText.className = "error";
          errorText.textContent = message || t("openEditorFailed");
          const actions = document.getElementById("open-editor-link")?.closest(".result-actions");
          if (actions) {
            actions.insertAdjacentElement("afterend", errorText);
            return;
          }
          fields.statusMessage.textContent = errorText.textContent;
          fields.statusMessage.className = "error";
        }

        async function sendFollowUp(prompt) {
          fields.followUp.classList.remove("hidden");
          fields.followUp.innerHTML = `<strong>${escapeHtml(t("continuing"))}</strong>`;
          try {
            const api = window.openai || {};
            if (typeof api.sendFollowUpMessage !== "function") {
              throw new Error(t("followUpUnavailable"));
            }
            await api.sendFollowUpMessage({ prompt });
            fields.followUp.innerHTML = `<strong class="ok">${escapeHtml(t("followUpSent"))}</strong>`;
          } catch (error) {
            fields.followUp.innerHTML = "";
            const title = document.createElement("strong");
            title.className = "error";
            title.textContent = error instanceof Error ? error.message : String(error);
            const pre = document.createElement("pre");
            pre.textContent = prompt || "";
            const retry = document.createElement("button");
            retry.type = "button";
            retry.textContent = t("retryFollowUp");
            retry.addEventListener("click", () => sendFollowUp(prompt));
            fields.followUp.append(title, pre, retry);
          }
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;");
        }

        function escapeAttribute(value) {
          return escapeHtml(value).replace(/"/g, "&quot;");
        }

        fields.projectName.addEventListener("input", () => {
          currentProjectId = slugify(fields.projectName.value);
          resetReadyState();
        });
        fields.addMediaSourceButton.addEventListener("click", () => {
          openHostFilePicker();
        });
        fields.mediaFilePicker.addEventListener("change", handlePickedFiles);
        fields.form.addEventListener("input", () => {
          resetReadyState();
        });
        fields.form.addEventListener("submit", submit);

        const defaults = initialDefaults();
        applyLanguage(defaults);
        applyDefaults(defaults);
      })();
    </script>
  </body>
</html>
